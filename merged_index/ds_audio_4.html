<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Audio Library — manage projects and text-audio pairs" />
  <title>Audio Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
/* ============================================
   AUDIO LIBRARY — Dark Studio Aesthetic
   Fonts: Syne (headings) + Space Mono (body/code)
   Colors: Deep charcoal bg, amber accent, teal CTA
   ============================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-display: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;

  --bg: #0e0e0f;
  --bg-surface: #161618;
  --bg-raised: #1e1e21;
  --bg-hover: #262629;
  --border: #2a2a2e;
  --border-light: #343438;

  --text: #e8e3d8;
  --text-muted: #6b6870;
  --text-dim: #4a4850;

  --amber: #f5a623;
  --amber-dim: #a3701a;
  --teal: #00c4a7;
  --teal-dim: #007a67;
  --red: #e05252;
  --red-dim: #8a3232;

  --sidebar-w: 260px;
  --header-h: 52px;
  --player-h: 72px;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;

  --transition: 180ms ease;
}

html, body {
  height: 100%;
  font-family: var(--font-mono);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
  line-height: 1.6;
}

.hidden { display: none !important; }

/* ============================================
   HEADER
   ============================================ */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
}

.header__logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header__icon {
  font-size: 20px;
  color: var(--amber);
  line-height: 1;
}

.header__title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text);
}

.header__status {
  font-size: 11px;
  color: var(--teal);
  letter-spacing: 0.12em;
  font-weight: 700;
}

/* ============================================
   LAYOUT
   ============================================ */
.layout {
  display: flex;
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
}

/* ============================================
   SIDEBAR
   ============================================ */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: var(--header-h);
  bottom: 0;
  left: 0;
  overflow-y: auto;
  padding-bottom: var(--player-h);
}

.sidebar__top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar__heading {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}

.btn-icon {
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--amber);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.btn-icon:hover {
  background: var(--bg-raised);
  border-color: var(--amber-dim);
}

/* New project form */
.new-project-form {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--bg-raised);
  animation: slideDown 0.18s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.form-row { display: flex; gap: 8px; }

/* Project list */
.project-list {
  padding: 8px 0;
  flex: 1;
}

.project-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: var(--transition);
  user-select: none;
}

.project-item:hover {
  background: var(--bg-hover);
}

.project-item.active {
  background: var(--bg-raised);
  border-left-color: var(--amber);
}

.project-item__dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
  transition: var(--transition);
}

.project-item.active .project-item__dot {
  background: var(--amber);
}

.project-item__info { flex: 1; min-width: 0; }

.project-item__name {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-item__count {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}

/* sidebar empty state */
.sidebar-empty {
  padding: 24px 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.8;
}

/* ============================================
   CONTENT AREA
   ============================================ */
.content {
  flex: 1;
  margin-left: var(--sidebar-w);
  padding: 28px 32px;
  padding-bottom: calc(var(--player-h) + 28px);
  min-height: 100%;
}

.content__empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  color: var(--text-dim);
  gap: 16px;
  animation: fadeIn 0.4s ease;
}

.empty-art {
  font-size: 64px;
  color: var(--border-light);
  line-height: 1;
  animation: pulse 3s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.9; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.content__project {
  animation: fadeIn 0.25s ease;
}

.content__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.content__title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.01em;
}

.content__desc {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

.content__actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  align-items: flex-start;
  padding-top: 4px;
}

/* ============================================
   UPLOAD PANEL
   ============================================ */
.upload-panel {
  background: var(--bg-surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 24px;
  animation: slideDown 0.2s ease;
}

.upload-panel__title {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.form-group {
  margin-bottom: 14px;
}

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
}

.form-input, .form-textarea {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: var(--transition);
  resize: none;
}

.form-input:focus, .form-textarea:focus {
  border-color: var(--teal-dim);
  background: var(--bg);
}

.form-input::placeholder, .form-textarea::placeholder {
  color: var(--text-dim);
}

.file-drop {
  border: 1px dashed var(--border-light);
  border-radius: var(--radius-md);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.file-drop:hover, .file-drop.dragover {
  border-color: var(--teal-dim);
  background: rgba(0, 196, 167, 0.04);
}

.file-drop__icon {
  font-size: 28px;
  color: var(--text-dim);
}

.file-drop__text {
  font-size: 12px;
  color: var(--text-muted);
}

.file-drop__link {
  color: var(--teal);
  cursor: pointer;
  text-decoration: underline;
}

.file-drop__name {
  font-size: 12px;
  color: var(--amber);
  font-weight: 700;
}

.upload-form__actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.upload-status {
  margin-top: 10px;
  font-size: 12px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  background: rgba(245, 166, 35, 0.1);
  color: var(--amber);
  border-left: 2px solid var(--amber);
}

.upload-status.error {
  background: rgba(224, 82, 82, 0.1);
  color: var(--red);
  border-left-color: var(--red);
}

/* ============================================
   AUDIO ITEMS LIST
   ============================================ */
.audio-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.audio-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
  transition: var(--transition);
  animation: fadeIn 0.2s ease;
}

.audio-card:hover {
  border-color: var(--border-light);
  background: var(--bg-raised);
}

.audio-card__title {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}

.audio-card__preview {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 500px;
}

.audio-card__date {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

.audio-card__actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.audio-card__play {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--amber);
  border: none;
  color: var(--bg);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}

.audio-card__play:hover {
  background: #ffc14d;
  transform: scale(1.08);
}

.audio-card__play.playing {
  background: var(--teal);
}

.audio-card__script {
  background: transparent;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 10px;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}

.audio-card__script:hover {
  border-color: var(--teal-dim);
  color: var(--teal);
}

.audio-card__delete {
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  font-size: 13px;
  padding: 5px 8px;
  cursor: pointer;
  transition: var(--transition);
}

.audio-card__delete:hover {
  border-color: var(--red-dim);
  color: var(--red);
}

.audio-empty {
  text-align: center;
  padding: 48px 0;
  color: var(--text-dim);
  font-size: 13px;
}

.audio-loading {
  text-align: center;
  padding: 48px 0;
  color: var(--text-dim);
}

.spinner-ring {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-light);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================
   PLAYER
   ============================================ */
.player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--player-h);
  background: var(--bg-surface);
  border-top: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 20px;
  z-index: 200;
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.player__info {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 180px;
  max-width: 220px;
}

.player__track-icon {
  font-size: 20px;
  color: var(--amber);
  flex-shrink: 0;
}

.player__meta {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.player__title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player__project {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player__controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.player__btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  transition: var(--transition);
}

.player__btn:hover { color: var(--text); background: var(--bg-hover); }

.player__btn--play {
  width: 40px;
  height: 40px;
  background: var(--amber);
  color: var(--bg);
  border-radius: 50%;
  font-size: 15px;
}

.player__btn--play:hover {
  background: #ffc14d;
  color: var(--bg);
}

.player__btn--play.paused { }

.player__progress-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
}

.player__time {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 32px;
  text-align: center;
}

.player__progress {
  flex: 1;
  height: 4px;
  background: var(--bg-hover);
  border-radius: 99px;
  cursor: pointer;
  position: relative;
}

.player__progress-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 99px;
  width: 0%;
  transition: width 0.2s linear;
  pointer-events: none;
}

.player__volume {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.player__vol-icon {
  font-size: 12px;
  color: var(--text-dim);
}

.player__vol-slider {
  width: 72px;
  accent-color: var(--amber);
  cursor: pointer;
}

.player__close {
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: var(--transition);
  flex-shrink: 0;
}

.player__close:hover { color: var(--red); }

/* ============================================
   TEXT PANEL
   ============================================ */
.text-panel {
  position: fixed;
  right: 0;
  top: var(--header-h);
  bottom: var(--player-h);
  width: 380px;
  background: var(--bg-surface);
  border-left: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  z-index: 150;
  animation: slideInRight 0.22s ease;
  overflow: hidden;
}

@keyframes slideInRight {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}

.text-panel__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.text-panel__label {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--text-muted);
}

.text-panel__close {
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  transition: var(--transition);
}

.text-panel__close:hover { color: var(--text); }

.text-panel__title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--amber);
  padding: 16px 20px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.text-panel__body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
  font-size: 13px;
  line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap;
}

/* ============================================
   MODAL
   ============================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
  backdrop-filter: blur(4px);
}

.modal {
  background: var(--bg-raised);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  min-width: 280px;
  text-align: center;
  animation: fadeIn 0.18s ease;
}

.modal__msg {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--text);
  margin-bottom: 20px;
}

.modal__actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}

/* ============================================
   BUTTONS
   ============================================ */
.btn {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  cursor: pointer;
  transition: var(--transition);
  text-transform: uppercase;
  white-space: nowrap;
}

.btn--sm { padding: 5px 12px; font-size: 11px; }

.btn--primary {
  background: var(--teal);
  color: var(--bg);
  border-color: var(--teal);
}
.btn--primary:hover { background: #00dfc0; border-color: #00dfc0; }

.btn--accent {
  background: var(--amber);
  color: var(--bg);
  border-color: var(--amber);
}
.btn--accent:hover { background: #ffc14d; border-color: #ffc14d; }

.btn--ghost {
  background: transparent;
  color: var(--text-muted);
  border-color: var(--border-light);
}
.btn--ghost:hover { background: var(--bg-hover); color: var(--text); }

.btn--danger {
  background: transparent;
  color: var(--red);
  border-color: var(--red-dim);
}
.btn--danger:hover { background: rgba(224,82,82,0.1); }

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ============================================
   SCROLLBAR
   ============================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

</style>
</head>
<body>

  <header class="header">
    <div class="header__logo">
      <span class="header__icon">◈</span>
      <span class="header__title">Audio Library</span>
    </div>
    <div class="header__status" id="header-status">● READY</div>
  </header>

  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar__top">
        <h2 class="sidebar__heading">PROJECTS</h2>
        <button class="btn-icon" id="btn-new-project" title="New project">+</button>
      </div>

      <form class="new-project-form hidden" id="new-project-form">
        <input class="form-input" type="text" name="name" placeholder="Project name" maxlength="255" required />
        <input class="form-input" type="text" name="description" placeholder="Description (optional)" maxlength="500" />
        <div class="form-row">
          <button type="submit" class="btn btn--primary btn--sm">Create</button>
          <button type="button" class="btn btn--ghost btn--sm" id="btn-cancel-project">Cancel</button>
        </div>
      </form>

      <div class="project-list" id="project-list"></div>
    </aside>

    <main class="content">
      <div class="content__empty" id="content-empty">
        <div class="empty-art">◈</div>
        <p>Select a project to view its audio items</p>
      </div>

      <div class="content__project hidden" id="content-project">
        <div class="content__header">
          <div>
            <h1 class="content__title" id="project-title">Project Name</h1>
            <p class="content__desc" id="project-desc"></p>
          </div>
          <div class="content__actions">
            <button class="btn btn--accent btn--sm" id="btn-add-audio">+ Add Audio</button>
            <button class="btn btn--danger btn--sm" id="btn-delete-project">Delete Project</button>
          </div>
        </div>

        <div class="upload-panel hidden" id="upload-panel">
          <h3 class="upload-panel__title">NEW AUDIO ENTRY</h3>
          <form id="upload-form">
            <div class="form-group">
              <label class="form-label">Title</label>
              <input class="form-input" type="text" name="title" placeholder="e.g. Chapter 1 — Introduction" maxlength="255" required />
            </div>
            <div class="form-group">
              <label class="form-label">Text Content</label>
              <textarea class="form-textarea" name="text_content" placeholder="Paste the text script here…" rows="5" required></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Audio File</label>
              <div class="file-drop" id="file-drop">
                <span class="file-drop__icon">♪</span>
                <span class="file-drop__text">Drop audio file or <label for="audio-input" class="file-drop__link">browse</label></span>
                <input type="file" id="audio-input" accept="audio/*" class="hidden" />
                <span class="file-drop__name hidden" id="file-name"></span>
              </div>
            </div>
            <div class="upload-form__actions">
              <button type="submit" class="btn btn--primary" id="btn-upload-submit">Upload &amp; Save</button>
              <button type="button" class="btn btn--ghost" id="btn-upload-cancel">Cancel</button>
            </div>
            <p class="upload-status hidden" id="upload-status"></p>
          </form>
        </div>

        <div class="audio-list" id="audio-list"></div>
      </div>
    </main>

  </div>

  <div class="player hidden" id="player">
    <div class="player__info">
      <span class="player__track-icon">♪</span>
      <div class="player__meta">
        <span class="player__title" id="player-title">—</span>
        <span class="player__project" id="player-project">—</span>
      </div>
    </div>
    <div class="player__controls">
      <button class="player__btn" id="player-rewind" title="Rewind 10s">«</button>
      <button class="player__btn player__btn--play" id="player-play">▶</button>
      <button class="player__btn" id="player-forward" title="Forward 10s">»</button>
    </div>
    <div class="player__progress-wrap">
      <span class="player__time" id="player-current">0:00</span>
      <div class="player__progress" id="player-progress">
        <div class="player__progress-fill" id="player-fill"></div>
      </div>
      <span class="player__time" id="player-duration">0:00</span>
    </div>
    <div class="player__volume">
      <span class="player__vol-icon">♦</span>
      <input type="range" class="player__vol-slider" id="player-volume" min="0" max="1" step="0.02" value="0.8" />
    </div>
    <button class="player__close" id="player-close" title="Close player">✕</button>
    <audio id="audio-engine" preload="metadata"></audio>
  </div>

  <div class="text-panel hidden" id="text-panel">
    <div class="text-panel__header">
      <span class="text-panel__label">SCRIPT</span>
      <button class="text-panel__close" id="text-panel-close">✕</button>
    </div>
    <h3 class="text-panel__title" id="text-panel-title"></h3>
    <div class="text-panel__body" id="text-panel-body"></div>
  </div>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <p class="modal__msg" id="modal-msg">Are you sure?</p>
      <div class="modal__actions">
        <button class="btn btn--danger" id="modal-confirm">Delete</button>
        <button class="btn btn--ghost" id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script>
/**
 * API Helper Module
 * Handles all communication with the backend
 *
 * Usage in app.js:
 *   api.get('/api/health')
 *   api.post('/api/items', { name: 'Item 1' })
 *   api.put('/api/items/1', { name: 'Updated' })
 *   api.delete('/api/items/1')
 *   api.uploadForm('/api/upload', formData)
 *
 * Upload file:
 *   const formData = new FormData();
 *   formData.append('file', fileInput.files[0]);
 *   const { file_url } = await api.uploadForm('/api/upload', formData);
 */

const API_URL = 'https://bsk34dm44edrt63anrgbhytapy0rxvoy.lambda-url.ap-southeast-1.on.aws';

/**
 * Process response: check status and parse JSON
 */
async function processResponse(response) {
  const data = await response.json();

  if (!response.ok) {
    throw new Error(
      data?.detail || data?.error || `HTTP ${response.status}`
    );
  }

  if (data && data.error) {
    throw new Error(data.error);
  }

  return data;
}

const api = {
  /**
   * Make a GET request
   * @param {string} path - API path (e.g., '/api/health')
   * @param {object} params - Query parameters
   * @returns {Promise<any>} Response data
   */
  async get(path, params = {}) {
    const url = new URL(`${API_URL}${path}`);
    Object.entries(params).forEach(([key, value]) => {
      if (value !== undefined && value !== null) {
        url.searchParams.append(key, value);
      }
    });

    const response = await fetch(url.toString());
    return processResponse(response);
  },

  /**
   * Make a POST request
   * @param {string} path - API path (e.g., '/api/items')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async post(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a PUT request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async put(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a DELETE request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Optional request body
   * @returns {Promise<any>} Response data
   */
  async delete(path, body = null) {
    const options = { method: 'DELETE' };
    if (body) {
      options.headers = { 'Content-Type': 'application/json' };
      options.body = JSON.stringify(body);
    }

    const response = await fetch(`${API_URL}${path}`, options);
    return processResponse(response);
  },

  /**
   * Upload files with FormData
   * @param {string} path - API path (e.g., '/api/upload')
   * @param {FormData} formData - FormData object with files and fields
   * @returns {Promise<any>} Response data
   */
  async uploadForm(path, formData) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      body: formData,
    });
    return processResponse(response);
  },
};

// Export for use in other modules
window.api = api;

</script>
  <script>
/**
 * Audio Library — Main App Logic
 */

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  projects: [],
  activeProject: null,
  audioItems: [],
  playingItemId: null,
};

// ── DOM refs ───────────────────────────────────────────────────────────────
const projectList     = document.getElementById('project-list');
const contentEmpty    = document.getElementById('content-empty');
const contentProject  = document.getElementById('content-project');
const projectTitle    = document.getElementById('project-title');
const projectDesc     = document.getElementById('project-desc');
const audioList       = document.getElementById('audio-list');
const headerStatus    = document.getElementById('header-status');

const newProjectForm  = document.getElementById('new-project-form');
const btnNewProject   = document.getElementById('btn-new-project');
const btnCancelProj   = document.getElementById('btn-cancel-project');

const uploadPanel     = document.getElementById('upload-panel');
const uploadForm      = document.getElementById('upload-form');
const btnAddAudio     = document.getElementById('btn-add-audio');
const btnUploadCancel = document.getElementById('btn-upload-cancel');
const btnUploadSubmit = document.getElementById('btn-upload-submit');
const uploadStatus    = document.getElementById('upload-status');
const audioInput      = document.getElementById('audio-input');
const fileDrop        = document.getElementById('file-drop');
const fileNameEl      = document.getElementById('file-name');

const btnDeleteProject = document.getElementById('btn-delete-project');

// Player
const player          = document.getElementById('player');
const playerPlay      = document.getElementById('player-play');
const playerRewind    = document.getElementById('player-rewind');
const playerForward   = document.getElementById('player-forward');
const playerClose     = document.getElementById('player-close');
const playerTitle     = document.getElementById('player-title');
const playerProject   = document.getElementById('player-project');
const playerCurrent   = document.getElementById('player-current');
const playerDuration  = document.getElementById('player-duration');
const playerFill      = document.getElementById('player-fill');
const playerProgress  = document.getElementById('player-progress');
const playerVolume    = document.getElementById('player-volume');
const audioEngine     = document.getElementById('audio-engine');

// Text panel
const textPanel       = document.getElementById('text-panel');
const textPanelTitle  = document.getElementById('text-panel-title');
const textPanelBody   = document.getElementById('text-panel-body');
const textPanelClose  = document.getElementById('text-panel-close');

// Modal
const modalOverlay    = document.getElementById('modal-overlay');
const modalMsg        = document.getElementById('modal-msg');
const modalConfirm    = document.getElementById('modal-confirm');
const modalCancel     = document.getElementById('modal-cancel');

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);

async function init() {
  setupPlayerEvents();
  setupFormEvents();
  await loadProjects();
}

// ── Projects ───────────────────────────────────────────────────────────────
async function loadProjects() {
  setStatus('LOADING…', 'loading');
  try {
    state.projects = await api.get('/api/projects');
    renderProjectList();
    setStatus('READY', 'ok');
  } catch (e) {
    setStatus('OFFLINE', 'error');
    projectList.innerHTML = `<p class="sidebar-empty">Could not connect to backend</p>`;
  }
}

function renderProjectList() {
  if (state.projects.length === 0) {
    projectList.innerHTML = `<p class="sidebar-empty">No projects yet.<br>Click + to create one.</p>`;
    return;
  }
  projectList.innerHTML = state.projects.map(p => `
    <div class="project-item${state.activeProject?.id === p.id ? ' active' : ''}" data-id="${p.id}">
      <span class="project-item__dot"></span>
      <div class="project-item__info">
        <div class="project-item__name">${escapeHtml(p.name)}</div>
        <div class="project-item__count">${p.audio_count} audio${p.audio_count !== 1 ? 's' : ''}</div>
      </div>
    </div>
  `).join('');

  projectList.querySelectorAll('.project-item').forEach(el => {
    el.addEventListener('click', () => selectProject(+el.dataset.id));
  });
}

async function selectProject(id) {
  state.activeProject = state.projects.find(p => p.id === id) || null;
  renderProjectList();

  if (!state.activeProject) return;

  projectTitle.textContent = state.activeProject.name;
  projectDesc.textContent = state.activeProject.description || '';
  contentEmpty.classList.add('hidden');
  contentProject.classList.remove('hidden');
  uploadPanel.classList.add('hidden');
  uploadForm.reset();
  fileNameEl.classList.add('hidden');

  await loadAudioItems();
}

// ── Create / Delete Project ────────────────────────────────────────────────
btnNewProject.addEventListener('click', () => {
  newProjectForm.classList.toggle('hidden');
  if (!newProjectForm.classList.contains('hidden')) {
    newProjectForm.querySelector('[name="name"]').focus();
  }
});

btnCancelProj.addEventListener('click', () => {
  newProjectForm.classList.add('hidden');
  newProjectForm.reset();
});

newProjectForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = newProjectForm.querySelector('[name="name"]').value.trim();
  const description = newProjectForm.querySelector('[name="description"]').value.trim();
  if (!name) return;

  const btn = newProjectForm.querySelector('[type="submit"]');
  btn.disabled = true;
  try {
    const project = await api.post('/api/projects', { name, description: description || null });
    state.projects.unshift(project);
    newProjectForm.classList.add('hidden');
    newProjectForm.reset();
    renderProjectList();
    selectProject(project.id);
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
});

btnDeleteProject.addEventListener('click', () => {
  if (!state.activeProject) return;
  showConfirm(`Delete project "${state.activeProject.name}" and all its audio items?`, async () => {
    try {
      await api.delete(`/api/projects/${state.activeProject.id}`);
      state.projects = state.projects.filter(p => p.id !== state.activeProject.id);
      state.activeProject = null;
      state.audioItems = [];
      contentProject.classList.add('hidden');
      contentEmpty.classList.remove('hidden');
      renderProjectList();
      // Stop player if playing
      stopPlayer();
    } catch (e) {
      alert('Error: ' + e.message);
    }
  });
});

// ── Audio Items ────────────────────────────────────────────────────────────
async function loadAudioItems() {
  if (!state.activeProject) return;
  audioList.innerHTML = `<div class="audio-loading"><span class="spinner-ring"></span>Loading…</div>`;
  try {
    state.audioItems = await api.get(`/api/projects/${state.activeProject.id}/audio-items`);
    renderAudioList();
  } catch (e) {
    audioList.innerHTML = `<div class="audio-empty">Failed to load audio items.</div>`;
  }
}

function renderAudioList() {
  if (state.audioItems.length === 0) {
    audioList.innerHTML = `<div class="audio-empty">No audio items yet. Click "+ Add Audio" to upload one.</div>`;
    return;
  }
  audioList.innerHTML = state.audioItems.map(item => `
    <div class="audio-card" data-id="${item.id}">
      <div>
        <div class="audio-card__title">${escapeHtml(item.title)}</div>
        <div class="audio-card__preview">${escapeHtml(item.text_content.slice(0, 120))}${item.text_content.length > 120 ? '…' : ''}</div>
        <div class="audio-card__date">${formatDate(item.created_at)}</div>
      </div>
      <div class="audio-card__actions">
        <button class="audio-card__script" onclick="showTextPanel(${item.id})">Script</button>
        <button class="audio-card__play${state.playingItemId === item.id ? ' playing' : ''}" onclick="playItem(${item.id})" title="Play / Pause">
          ${state.playingItemId === item.id ? '■' : '▶'}
        </button>
        <button class="audio-card__delete" onclick="deleteAudioItem(${item.id})" title="Delete">✕</button>
      </div>
    </div>
  `).join('');
}

// ── Upload Audio Item ──────────────────────────────────────────────────────
function setupFormEvents() {
  btnAddAudio.addEventListener('click', () => {
    uploadPanel.classList.toggle('hidden');
    if (!uploadPanel.classList.contains('hidden')) {
      uploadPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });

  btnUploadCancel.addEventListener('click', () => {
    uploadPanel.classList.add('hidden');
    uploadForm.reset();
    fileNameEl.classList.add('hidden');
    hideUploadStatus();
  });

  // File input
  audioInput.addEventListener('change', () => {
    const f = audioInput.files[0];
    if (f) {
      fileNameEl.textContent = f.name;
      fileNameEl.classList.remove('hidden');
    }
  });

  // Drag & drop
  fileDrop.addEventListener('dragover', (e) => { e.preventDefault(); fileDrop.classList.add('dragover'); });
  fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
  fileDrop.addEventListener('drop', (e) => {
    e.preventDefault();
    fileDrop.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('audio/')) {
      const dt = new DataTransfer();
      dt.items.add(file);
      audioInput.files = dt.files;
      fileNameEl.textContent = file.name;
      fileNameEl.classList.remove('hidden');
    }
  });

  uploadForm.addEventListener('submit', handleUploadSubmit);

  textPanelClose.addEventListener('click', () => textPanel.classList.add('hidden'));
}

async function handleUploadSubmit(e) {
  e.preventDefault();
  if (!state.activeProject) return;

  const title = uploadForm.querySelector('[name="title"]').value.trim();
  const text_content = uploadForm.querySelector('[name="text_content"]').value.trim();
  const file = audioInput.files[0];

  if (!title || !text_content) {
    showUploadStatus('Please fill in all fields.', true);
    return;
  }
  if (!file) {
    showUploadStatus('Please select an audio file.', true);
    return;
  }

  btnUploadSubmit.disabled = true;
  showUploadStatus('Uploading audio file…');

  try {
    // Step 1: upload file
    const formData = new FormData();
    formData.append('file', file);
    const { file_url } = await api.uploadForm('/api/upload', formData);

    showUploadStatus('Saving entry…');

    // Step 2: save audio item
    const item = await api.post(`/api/projects/${state.activeProject.id}/audio-items`, {
      title,
      text_content,
      audio_url: file_url,
    });

    state.audioItems.unshift(item);
    // Update project count
    const proj = state.projects.find(p => p.id === state.activeProject.id);
    if (proj) proj.audio_count += 1;
    renderProjectList();
    renderAudioList();

    uploadPanel.classList.add('hidden');
    uploadForm.reset();
    fileNameEl.classList.add('hidden');
    hideUploadStatus();
  } catch (err) {
    showUploadStatus('Error: ' + err.message, true);
  } finally {
    btnUploadSubmit.disabled = false;
  }
}

function showUploadStatus(msg, isError = false) {
  uploadStatus.textContent = msg;
  uploadStatus.className = 'upload-status' + (isError ? ' error' : '');
  uploadStatus.classList.remove('hidden');
}

function hideUploadStatus() {
  uploadStatus.classList.add('hidden');
}

// ── Delete Audio Item ──────────────────────────────────────────────────────
function deleteAudioItem(id) {
  const item = state.audioItems.find(i => i.id === id);
  if (!item) return;
  showConfirm(`Delete audio item "${item.title}"?`, async () => {
    try {
      await api.delete(`/api/projects/${state.activeProject.id}/audio-items/${id}`);
      state.audioItems = state.audioItems.filter(i => i.id !== id);
      const proj = state.projects.find(p => p.id === state.activeProject.id);
      if (proj && proj.audio_count > 0) proj.audio_count -= 1;
      renderProjectList();
      renderAudioList();
      if (state.playingItemId === id) stopPlayer();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  });
}

// ── Text Panel ─────────────────────────────────────────────────────────────
function showTextPanel(id) {
  const item = state.audioItems.find(i => i.id === id);
  if (!item) return;
  textPanelTitle.textContent = item.title;
  textPanelBody.textContent = item.text_content;
  textPanel.classList.remove('hidden');
}

// ── Audio Player ───────────────────────────────────────────────────────────
function setupPlayerEvents() {
  playerPlay.addEventListener('click', togglePlayPause);
  playerRewind.addEventListener('click', () => { audioEngine.currentTime = Math.max(0, audioEngine.currentTime - 10); });
  playerForward.addEventListener('click', () => { audioEngine.currentTime = Math.min(audioEngine.duration || 0, audioEngine.currentTime + 10); });
  playerClose.addEventListener('click', stopPlayer);
  playerVolume.addEventListener('input', () => { audioEngine.volume = +playerVolume.value; });

  audioEngine.addEventListener('timeupdate', onTimeUpdate);
  audioEngine.addEventListener('loadedmetadata', () => {
    playerDuration.textContent = formatTime(audioEngine.duration);
  });
  audioEngine.addEventListener('ended', () => {
    playerPlay.textContent = '▶';
    playerPlay.classList.remove('paused');
    playerFill.style.width = '0%';
    playerCurrent.textContent = '0:00';
    // Reset card button
    renderAudioList();
    state.playingItemId = null;
  });

  playerProgress.addEventListener('click', (e) => {
    if (!audioEngine.duration) return;
    const rect = playerProgress.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audioEngine.currentTime = ratio * audioEngine.duration;
  });

  audioEngine.volume = +playerVolume.value;
}

function playItem(id) {
  const item = state.audioItems.find(i => i.id === id);
  if (!item) return;

  if (state.playingItemId === id) {
    togglePlayPause();
    return;
  }

  state.playingItemId = id;
  const audioUrl = `http://localhost:2701${item.audio_url}`;
  audioEngine.src = audioUrl;
  audioEngine.load();
  audioEngine.play().catch(err => console.warn('Play error:', err));

  playerTitle.textContent = item.title;
  playerProject.textContent = state.activeProject?.name || '';
  player.classList.remove('hidden');
  playerPlay.textContent = '■';
  playerFill.style.width = '0%';
  playerCurrent.textContent = '0:00';

  renderAudioList();
}

function togglePlayPause() {
  if (audioEngine.paused) {
    audioEngine.play();
    playerPlay.textContent = '■';
  } else {
    audioEngine.pause();
    playerPlay.textContent = '▶';
  }
}

function stopPlayer() {
  audioEngine.pause();
  audioEngine.src = '';
  player.classList.add('hidden');
  state.playingItemId = null;
  renderAudioList();
}

function onTimeUpdate() {
  const cur = audioEngine.currentTime;
  const dur = audioEngine.duration || 0;
  playerCurrent.textContent = formatTime(cur);
  if (dur) playerFill.style.width = ((cur / dur) * 100).toFixed(2) + '%';
}

// ── Modal ──────────────────────────────────────────────────────────────────
let _confirmCb = null;

function showConfirm(msg, onConfirm) {
  modalMsg.textContent = msg;
  _confirmCb = onConfirm;
  modalOverlay.classList.remove('hidden');
}

modalConfirm.addEventListener('click', async () => {
  modalOverlay.classList.add('hidden');
  if (_confirmCb) { await _confirmCb(); _confirmCb = null; }
});

modalCancel.addEventListener('click', () => {
  modalOverlay.classList.add('hidden');
  _confirmCb = null;
});

// ── Helpers ────────────────────────────────────────────────────────────────
function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function formatTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function setStatus(text, type) {
  const colors = { ok: 'var(--teal)', error: 'var(--red)', loading: 'var(--amber)' };
  headerStatus.textContent = `● ${text}`;
  headerStatus.style.color = colors[type] || 'var(--teal)';
}

</script>
