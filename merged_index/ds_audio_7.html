<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quản lý dự án âm thanh - tạo project và lưu trữ cặp text + audio">
  <title>AudioVault — Quản Lý Âm Thanh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
/* AudioVault — Dark Editorial Theme */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-display: 'Bebas Neue', sans-serif;
  --font-serif: 'Crimson Pro', Georgia, serif;
  --font-mono: 'IBM Plex Mono', monospace;

  --bg:        #0f0f0f;
  --bg-2:      #161616;
  --bg-3:      #1e1e1e;
  --bg-4:      #252525;
  --border:    #2a2a2a;
  --border-2:  #333;
  --accent:    #c9a84c;
  --accent-dim:#7a6030;
  --text:      #e8e0d0;
  --text-2:    #9e9689;
  --text-3:    #5e5a52;
  --error:     #e05252;
  --success:   #52b788;

  --sidebar-w: 260px;
  --player-h:  64px;
  --radius:    4px;
  --trans:     180ms ease;
}

html, body {
  height: 100%;
  font-family: var(--font-serif);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─────────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.sidebar__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
}

.sidebar__logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar__logo-mark {
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: 0.08em;
  background: var(--accent);
  color: #0f0f0f;
  padding: 3px 6px;
  border-radius: 2px;
  line-height: 1;
}

.sidebar__logo-name {
  font-family: var(--font-display);
  font-size: 16px;
  letter-spacing: 0.12em;
  color: var(--text);
}

.btn-new-project {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border-2);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--trans);
}
.btn-new-project:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(201,168,76,0.08);
}

.sidebar__search {
  padding: 12px 12px 8px;
}

.sidebar__search input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 7px 10px;
  border-radius: var(--radius);
  outline: none;
  transition: var(--trans);
}
.sidebar__search input::placeholder { color: var(--text-3); }
.sidebar__search input:focus { border-color: var(--accent-dim); }

.project-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}

.project-list__loading {
  display: flex;
  justify-content: center;
  padding: 24px;
}

.project-item {
  padding: 9px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--trans);
  margin-bottom: 2px;
  border: 1px solid transparent;
}
.project-item:hover { background: var(--bg-3); }
.project-item.is-active {
  background: rgba(201,168,76,0.1);
  border-color: var(--accent-dim);
}

.project-item__name {
  font-family: var(--font-serif);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.project-item.is-active .project-item__name { color: var(--accent); }

.project-item__meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
  margin-top: 2px;
}

.projects-empty {
  padding: 20px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-3);
  text-align: center;
  line-height: 1.6;
}

.sidebar__footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
}

.sidebar__count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ─────────────────────────────────────────────
   MAIN
───────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100vh;
}

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 40px;
  animation: fadeIn 0.4s ease;
}

.empty-state__icon {
  font-size: 48px;
  color: var(--text-3);
  line-height: 1;
}

.empty-state__title {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 0.1em;
  color: var(--text-2);
}

.empty-state__desc {
  font-family: var(--font-serif);
  font-size: 15px;
  color: var(--text-3);
  text-align: center;
  max-width: 320px;
  line-height: 1.6;
}

/* Project view */
.project-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: fadeIn 0.3s ease;
}

.project-view__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  gap: 16px;
  flex-shrink: 0;
}

.project-view__name {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 0.08em;
  color: var(--text);
  line-height: 1.1;
}

.project-view__desc {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text-2);
  margin-top: 4px;
  font-style: italic;
}

.project-view__actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  margin-top: 4px;
}

/* ─────────────────────────────────────────────
   PLAYER BAR
───────────────────────────────────────────── */
.player-bar {
  background: var(--bg-3);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: var(--player-h);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  animation: slideDown 0.25s ease;
}

@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

.player-bar__info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
  flex: 0 0 200px;
}

.player-bar__label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--accent);
}

.player-bar__title {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-bar__controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}

.player-btn {
  background: transparent;
  border: none;
  color: var(--text-2);
  cursor: pointer;
  padding: 4px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--trans);
  flex-shrink: 0;
}
.player-btn:hover { color: var(--accent); }
.player-btn--close:hover { color: var(--error); }

.player-progress {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

.player-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-3);
  min-width: 32px;
}

.player-track {
  flex: 1;
  height: 3px;
  background: var(--border-2);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}

.player-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.1s linear;
  pointer-events: none;
}

/* ─────────────────────────────────────────────
   ENTRIES AREA
───────────────────────────────────────────── */
.entries-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}

.entries-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.entries-header__label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text-3);
}

.entries-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  background: rgba(201,168,76,0.1);
  padding: 1px 7px;
  border-radius: 10px;
}

.entries-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.entries-loading {
  display: flex;
  justify-content: center;
  padding: 40px;
  grid-column: 1 / -1;
}

.entries-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 48px 24px;
}

.entries-empty__icon {
  font-size: 36px;
  color: var(--text-3);
  margin-bottom: 12px;
}

.entries-empty__text {
  font-family: var(--font-serif);
  font-size: 15px;
  color: var(--text-3);
  font-style: italic;
}

/* Entry card */
.entry-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: var(--trans);
  position: relative;
  overflow: hidden;
}

.entry-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--border-2);
  transition: var(--trans);
}

.entry-card:hover {
  border-color: var(--border-2);
  background: var(--bg-3);
}

.entry-card:hover::before,
.entry-card.is-playing::before {
  background: var(--accent);
}

.entry-card.is-playing {
  border-color: var(--accent-dim);
  background: rgba(201,168,76,0.05);
}

.entry-card__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}

.entry-card__title {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.entry-card.is-playing .entry-card__title { color: var(--accent); }

.entry-card__actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.entry-card__btn {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-3);
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--trans);
  font-size: 13px;
}

.entry-card__btn--play:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(201,168,76,0.1);
}

.entry-card__btn--delete:hover {
  border-color: var(--error);
  color: var(--error);
  background: rgba(224,82,82,0.08);
}

.entry-card__text {
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.entry-card__footer {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
}

.entry-card__audio-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--success);
  background: rgba(82,183,136,0.1);
  padding: 2px 6px;
  border-radius: 2px;
}

.entry-card__date {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-3);
  margin-left: auto;
}

/* Playing indicator */
.playing-dots {
  display: flex;
  gap: 3px;
  align-items: center;
}
.playing-dots span {
  width: 3px; height: 3px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 0.8s ease infinite;
}
.playing-dots span:nth-child(2) { animation-delay: 0.15s; }
.playing-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(2.5); }
}

/* ─────────────────────────────────────────────
   BUTTONS
───────────────────────────────────────────── */
.btn {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  border-radius: var(--radius);
  border: 1px solid transparent;
  cursor: pointer;
  transition: var(--trans);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  padding: 8px 16px;
}

.btn--primary {
  background: var(--accent);
  color: #0f0f0f;
  border-color: var(--accent);
  font-weight: 500;
}
.btn--primary:hover { background: #d4b056; border-color: #d4b056; }

.btn--ghost {
  background: transparent;
  color: var(--text-2);
  border-color: var(--border-2);
}
.btn--ghost:hover { border-color: var(--text-2); color: var(--text); }

.btn--danger-ghost {
  background: transparent;
  color: var(--text-3);
  border-color: var(--border);
}
.btn--danger-ghost:hover { border-color: var(--error); color: var(--error); }

.btn--sm { padding: 5px 12px; font-size: 11px; }

/* ─────────────────────────────────────────────
   MODAL
───────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s ease;
  padding: 20px;
}

.modal {
  background: var(--bg-2);
  border: 1px solid var(--border-2);
  border-radius: 6px;
  width: 100%;
  max-width: 480px;
  animation: scaleIn 0.2s ease;
  max-height: 90vh;
  overflow-y: auto;
}

.modal__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 0;
}

.modal__title {
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 0.08em;
  color: var(--text);
}

.modal__close {
  width: 28px; height: 28px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-3);
  cursor: pointer;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--trans);
}
.modal__close:hover { border-color: var(--error); color: var(--error); }

.modal__form { padding: 20px; }

.modal__footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* ─────────────────────────────────────────────
   FORM ELEMENTS
───────────────────────────────────────────── */
.form-field { margin-bottom: 16px; }

.form-label {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.required { color: var(--accent); }

.form-input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-serif);
  font-size: 15px;
  padding: 9px 12px;
  border-radius: var(--radius);
  outline: none;
  transition: var(--trans);
}
.form-input::placeholder { color: var(--text-3); }
.form-input:focus { border-color: var(--accent-dim); background: var(--bg-4); }
.form-input.is-error { border-color: var(--error); }

.form-textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
.form-textarea--lg { min-height: 100px; }

.form-error {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--error);
  margin-top: 4px;
  min-height: 14px;
}

/* File drop zone */
.file-drop {
  position: relative;
  border: 1px dashed var(--border-2);
  border-radius: var(--radius);
  background: var(--bg-3);
  transition: var(--trans);
  cursor: pointer;
}
.file-drop:hover { border-color: var(--accent-dim); background: var(--bg-4); }
.file-drop.is-dragover { border-color: var(--accent); background: rgba(201,168,76,0.06); }

.file-drop__input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.file-drop__body {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 24px;
  color: var(--text-3);
  pointer-events: none;
}

.file-drop__text {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text-2);
}

.file-drop__hint {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
}

.file-drop__selected {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  color: var(--success);
}

.file-drop__selected span {
  font-family: var(--font-mono);
  font-size: 11px;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-drop__remove {
  background: transparent;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 0 2px;
  transition: var(--trans);
  flex-shrink: 0;
}
.file-drop__remove:hover { color: var(--error); }

/* ─────────────────────────────────────────────
   SPINNER
───────────────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--border-2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.spinner--sm { width: 14px; height: 14px; border-width: 2px; }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.96); }
  to   { opacity: 1; transform: scale(1); }
}

</style>
</head>
<body>
  <!-- Sidebar: Projects -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <div class="sidebar__logo">
        <span class="sidebar__logo-mark">AV</span>
        <span class="sidebar__logo-name">AudioVault</span>
      </div>
      <button class="btn-new-project" id="btn-new-project" title="Tạo project mới">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="sidebar__search">
      <input type="text" id="project-search" placeholder="Tìm project..." autocomplete="off">
    </div>

    <nav class="project-list" id="project-list">
      <div class="project-list__loading" id="projects-loading">
        <span class="spinner"></span>
      </div>
    </nav>

    <div class="sidebar__footer">
      <span id="project-count" class="sidebar__count">0 projects</span>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="main">
    <!-- Empty state: no project selected -->
    <div class="empty-state" id="empty-state">
      <div class="empty-state__icon">◎</div>
      <h2 class="empty-state__title">Chọn một project</h2>
      <p class="empty-state__desc">Chọn project từ danh sách bên trái hoặc tạo project mới để bắt đầu.</p>
    </div>

    <!-- Project detail view (hidden until selected) -->
    <div class="project-view" id="project-view" style="display:none">
      <header class="project-view__header">
        <div class="project-view__meta">
          <h1 class="project-view__name" id="view-project-name">Project Name</h1>
          <p class="project-view__desc" id="view-project-desc"></p>
        </div>
        <div class="project-view__actions">
          <button class="btn btn--ghost btn--sm" id="btn-add-entry">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

  <script>
/**
 * API Helper Module
 * Handles all communication with the backend
 *
 * Usage in app.js:
 *   api.get('/api/health')
 *   api.post('/api/items', { name: 'Item 1' })
 *   api.put('/api/items/1', { name: 'Updated' })
 *   api.delete('/api/items/1')
 *   api.uploadForm('/api/upload', formData)
 *
 * Upload file:
 *   const formData = new FormData();
 *   formData.append('file', fileInput.files[0]);
 *   const { file_url } = await api.uploadForm('/api/upload', formData);
 */

const API_URL = 'https://eqbeoh4e6gxtdpgsfdtsutytny0vggdv.lambda-url.ap-southeast-1.on.aws';

/**
 * Process response: check status and parse JSON
 */
async function processResponse(response) {
  if (response.status === 204) return null;

  const data = await response.json();

  if (!response.ok) {
    throw new Error(
      data?.detail || data?.error || `HTTP ${response.status}`
    );
  }

  if (data && data.error) {
    throw new Error(data.error);
  }

  return data;
}

const api = {
  /**
   * Make a GET request
   * @param {string} path - API path (e.g., '/api/health')
   * @param {object} params - Query parameters
   * @returns {Promise<any>} Response data
   */
  async get(path, params = {}) {
    const url = new URL(`${API_URL}${path}`);
    Object.entries(params).forEach(([key, value]) => {
      if (value !== undefined && value !== null) {
        url.searchParams.append(key, value);
      }
    });

    const response = await fetch(url.toString());
    return processResponse(response);
  },

  /**
   * Make a POST request
   * @param {string} path - API path (e.g., '/api/items')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async post(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a PUT request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async put(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a DELETE request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Optional request body
   * @returns {Promise<any>} Response data
   */
  async delete(path, body = null) {
    const options = { method: 'DELETE' };
    if (body) {
      options.headers = { 'Content-Type': 'application/json' };
      options.body = JSON.stringify(body);
    }

    const response = await fetch(`${API_URL}${path}`, options);
    return processResponse(response);
  },

  /**
   * Upload files with FormData
   * @param {string} path - API path (e.g., '/api/upload')
   * @param {FormData} formData - FormData object with files and fields
   * @returns {Promise<any>} Response data
   */
  async uploadForm(path, formData) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      body: formData,
    });
    return processResponse(response);
  },
};

// Export for use in other modules
window.api = api;

</script>
  <script>
/**
 * AudioVault — Main Application
 */

// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  projects: [],
  activeProjectId: null,
  entries: [],
  playingEntryId: null,
  searchQuery: '',
};

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

const dom = {
  projectList:      $('project-list'),
  projectsLoading:  $('projects-loading'),
  projectCount:     $('project-count'),
  projectSearch:    $('project-search'),
  emptyState:       $('empty-state'),
  projectView:      $('project-view'),
  viewProjectName:  $('view-project-name'),
  viewProjectDesc:  $('view-project-desc'),
  entriesGrid:      $('entries-grid'),
  entriesLoading:   $('entries-loading'),
  entriesCount:     $('entries-count'),

  // Buttons
  btnNewProject:    $('btn-new-project'),
  btnAddEntry:      $('btn-add-entry'),
  btnDeleteProject: $('btn-delete-project'),

  // Player
  playerBar:        $('player-bar'),
  playerTitle:      $('player-title'),
  playerPlayPause:  $('player-play-pause'),
  playerTrack:      $('player-track'),
  playerFill:       $('player-fill'),
  playerCurrent:    $('player-current'),
  playerDuration:   $('player-duration'),
  playerClose:      $('player-close'),
  audioEl:          $('audio-element'),
  iconPlay:         document.querySelector('.icon-play'),
  iconPause:        document.querySelector('.icon-pause'),

  // Modal: Project
  modalProject:         $('modal-project'),
  formCreateProject:    $('form-create-project'),
  projectNameInput:     $('project-name'),
  projectDescInput:     $('project-desc'),
  errProjectName:       $('err-project-name'),
  btnCancelProject:     $('btn-cancel-project'),
  btnSubmitProject:     $('btn-submit-project'),
  modalProjectClose:    $('modal-project-close'),

  // Modal: Entry
  modalEntry:           $('modal-entry'),
  formAddEntry:         $('form-add-entry'),
  entryTitleInput:      $('entry-title'),
  entryTextInput:       $('entry-text'),
  entryAudioInput:      $('entry-audio'),
  errEntryTitle:        $('err-entry-title'),
  errEntryAudio:        $('err-entry-audio'),
  btnCancelEntry:       $('btn-cancel-entry'),
  btnSubmitEntry:       $('btn-submit-entry'),
  btnSubmitEntryText:   document.querySelector('#btn-submit-entry .btn__text'),
  btnSubmitEntryLoad:   document.querySelector('#btn-submit-entry .btn__loading'),
  modalEntryClose:      $('modal-entry-close'),
  fileDrop:             $('file-drop'),
  fileDropBody:         $('file-drop-body'),
  fileSelected:         $('file-selected'),
  fileSelectedName:     $('file-selected-name'),
  btnRemoveFile:        $('btn-remove-file'),
};

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  bindEvents();
  loadProjects();
});

// ─── Event bindings ───────────────────────────────────────────────────────────
function bindEvents() {
  // Sidebar
  dom.btnNewProject.addEventListener('click', openProjectModal);
  dom.projectSearch.addEventListener('input', e => {
    state.searchQuery = e.target.value.toLowerCase();
    renderProjectList();
  });

  // Project modal
  dom.btnCancelProject.addEventListener('click', closeProjectModal);
  dom.modalProjectClose.addEventListener('click', closeProjectModal);
  dom.modalProject.addEventListener('click', e => {
    if (e.target === dom.modalProject) closeProjectModal();
  });
  dom.formCreateProject.addEventListener('submit', handleCreateProject);

  // Entry modal
  dom.btnAddEntry.addEventListener('click', openEntryModal);
  dom.btnCancelEntry.addEventListener('click', closeEntryModal);
  dom.modalEntryClose.addEventListener('click', closeEntryModal);
  dom.modalEntry.addEventListener('click', e => {
    if (e.target === dom.modalEntry) closeEntryModal();
  });
  dom.formAddEntry.addEventListener('submit', handleAddEntry);

  // File drop
  dom.entryAudioInput.addEventListener('change', onFileChange);
  dom.btnRemoveFile.addEventListener('click', e => { e.preventDefault(); clearFileInput(); });
  dom.fileDrop.addEventListener('dragover', e => { e.preventDefault(); dom.fileDrop.classList.add('is-dragover'); });
  dom.fileDrop.addEventListener('dragleave', () => dom.fileDrop.classList.remove('is-dragover'));
  dom.fileDrop.addEventListener('drop', e => {
    e.preventDefault();
    dom.fileDrop.classList.remove('is-dragover');
    const file = e.dataTransfer.files[0];
    if (file) setFileInput(file);
  });

  // Delete project
  dom.btnDeleteProject.addEventListener('click', handleDeleteProject);

  // Player
  dom.playerPlayPause.addEventListener('click', togglePlayPause);
  dom.playerClose.addEventListener('click', closePlayer);
  dom.playerTrack.addEventListener('click', seekAudio);
  dom.audioEl.addEventListener('timeupdate', updateProgress);
  dom.audioEl.addEventListener('loadedmetadata', updateDuration);
  dom.audioEl.addEventListener('ended', onAudioEnded);

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeProjectModal();
      closeEntryModal();
    }
  });
}

// ─── Projects ─────────────────────────────────────────────────────────────────
async function loadProjects() {
  dom.projectsLoading.style.display = 'flex';
  try {
    state.projects = await api.get('/api/projects');
    renderProjectList();
  } catch (err) {
    dom.projectList.innerHTML = `<div class="projects-empty">Không thể tải projects.<br>${escapeHtml(err.message)}</div>`;
  } finally {
    dom.projectsLoading.style.display = 'none';
  }
}

function renderProjectList() {
  const filtered = state.projects.filter(p =>
    p.name.toLowerCase().includes(state.searchQuery) ||
    (p.description || '').toLowerCase().includes(state.searchQuery)
  );

  dom.projectCount.textContent = `${state.projects.length} project${state.projects.length !== 1 ? 's' : ''}`;

  // Remove existing project items
  dom.projectList.querySelectorAll('.project-item').forEach(el => el.remove());
  dom.projectList.querySelector('.projects-empty')?.remove();

  if (filtered.length === 0) {
    const el = document.createElement('div');
    el.className = 'projects-empty';
    el.textContent = state.projects.length === 0
      ? 'Chưa có project nào.\nNhấn + để tạo mới.'
      : 'Không tìm thấy kết quả.';
    dom.projectList.appendChild(el);
    return;
  }

  filtered.forEach(p => {
    const el = document.createElement('div');
    el.className = 'project-item' + (p.id === state.activeProjectId ? ' is-active' : '');
    el.dataset.id = p.id;
    el.innerHTML = `
      <div class="project-item__name">${escapeHtml(p.name)}</div>
      <div class="project-item__meta">${formatDate(p.created_at)}</div>
    `;
    el.addEventListener('click', () => selectProject(p.id));
    dom.projectList.appendChild(el);
  });
}

async function selectProject(projectId) {
  state.activeProjectId = projectId;
  renderProjectList();

  const project = state.projects.find(p => p.id === projectId);
  dom.viewProjectName.textContent = project.name;
  dom.viewProjectDesc.textContent = project.description || '';

  dom.emptyState.style.display = 'none';
  dom.projectView.style.display = 'flex';
  dom.projectView.style.flexDirection = 'column';

  await loadEntries(projectId);
}

// ─── Entries ──────────────────────────────────────────────────────────────────
async function loadEntries(projectId) {
  dom.entriesLoading.style.display = 'flex';
  dom.entriesGrid.innerHTML = '';
  dom.entriesGrid.appendChild(dom.entriesLoading);

  try {
    state.entries = await api.get(`/api/projects/${projectId}/entries`);
    renderEntries();
  } catch (err) {
    dom.entriesGrid.innerHTML = `<div class="entries-empty"><p class="entries-empty__text">Lỗi: ${escapeHtml(err.message)}</p></div>`;
  } finally {
    dom.entriesLoading.style.display = 'none';
  }
}

function renderEntries() {
  dom.entriesGrid.innerHTML = '';
  dom.entriesCount.textContent = state.entries.length > 0 ? state.entries.length : '';

  if (state.entries.length === 0) {
    dom.entriesGrid.innerHTML = `
      <div class="entries-empty">
        <div class="entries-empty__icon">♪</div>
        <p class="entries-empty__text">Chưa có bản ghi nào. Nhấn "Thêm bản ghi" để bắt đầu.</p>
      </div>`;
    return;
  }

  state.entries.forEach(entry => {
    const card = document.createElement('div');
    card.className = 'entry-card' + (entry.id === state.playingEntryId ? ' is-playing' : '');
    card.dataset.entryId = entry.id;

    const isPlaying = entry.id === state.playingEntryId;
    const playIndicator = isPlaying
      ? `<div class="playing-dots"><span></span><span></span><span></span></div>`
      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;

    card.innerHTML = `
      <div class="entry-card__header">
        <div class="entry-card__title">${escapeHtml(entry.title)}</div>
        <div class="entry-card__actions">
          <button class="entry-card__btn entry-card__btn--play" data-id="${entry.id}" title="Phát audio">${playIndicator}</button>
          <button class="entry-card__btn entry-card__btn--delete" data-id="${entry.id}" title="Xóa">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M6 4V2h4v2M5 4v9h6V4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      ${entry.text_content ? `<div class="entry-card__text">${escapeHtml(entry.text_content)}</div>` : ''}
      <div class="entry-card__footer">
        ${entry.audio_url ? `<span class="entry-card__audio-badge">AUDIO</span>` : ''}
        <span class="entry-card__date">${formatDate(entry.created_at)}</span>
      </div>
    `;

    card.querySelector('.entry-card__btn--play').addEventListener('click', e => {
      e.stopPropagation();
      playEntry(entry);
    });
    card.querySelector('.entry-card__btn--delete').addEventListener('click', e => {
      e.stopPropagation();
      handleDeleteEntry(entry.id);
    });
    card.addEventListener('click', () => playEntry(entry));

    dom.entriesGrid.appendChild(card);
  });
}

// ─── Audio Player ─────────────────────────────────────────────────────────────
function playEntry(entry) {
  if (!entry.audio_url) return;

  const audioSrc = `http://localhost:2701${entry.audio_url}`;

  if (state.playingEntryId === entry.id) {
    togglePlayPause();
    return;
  }

  state.playingEntryId = entry.id;
  dom.playerTitle.textContent = entry.title;
  dom.audioEl.src = audioSrc;
  dom.audioEl.play();
  showPlayState(true);
  dom.playerBar.style.display = 'flex';
  dom.playerFill.style.width = '0%';
  dom.playerCurrent.textContent = '0:00';

  renderEntries(); // re-render to update active state
}

function togglePlayPause() {
  if (dom.audioEl.paused) {
    dom.audioEl.play();
    showPlayState(true);
  } else {
    dom.audioEl.pause();
    showPlayState(false);
  }
}

function showPlayState(playing) {
  dom.iconPlay.style.display = playing ? 'none' : 'inline';
  dom.iconPause.style.display = playing ? 'inline' : 'none';
}

function closePlayer() {
  dom.audioEl.pause();
  dom.audioEl.src = '';
  dom.playerBar.style.display = 'none';
  state.playingEntryId = null;
  showPlayState(false);
  renderEntries();
}

function seekAudio(e) {
  const rect = dom.playerTrack.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  dom.audioEl.currentTime = ratio * dom.audioEl.duration;
}

function updateProgress() {
  if (!dom.audioEl.duration) return;
  const pct = (dom.audioEl.currentTime / dom.audioEl.duration) * 100;
  dom.playerFill.style.width = pct + '%';
  dom.playerCurrent.textContent = formatTime(dom.audioEl.currentTime);
}

function updateDuration() {
  dom.playerDuration.textContent = formatTime(dom.audioEl.duration);
}

function onAudioEnded() {
  showPlayState(false);
  dom.playerFill.style.width = '100%';
}

function formatTime(seconds) {
  if (!seconds || isNaN(seconds)) return '0:00';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ─── Modals ───────────────────────────────────────────────────────────────────
function openProjectModal() {
  dom.formCreateProject.reset();
  dom.errProjectName.textContent = '';
  dom.projectNameInput.classList.remove('is-error');
  dom.modalProject.style.display = 'flex';
  setTimeout(() => dom.projectNameInput.focus(), 50);
}

function closeProjectModal() {
  dom.modalProject.style.display = 'none';
}

function openEntryModal() {
  dom.formAddEntry.reset();
  dom.errEntryTitle.textContent = '';
  dom.errEntryAudio.textContent = '';
  dom.entryTitleInput.classList.remove('is-error');
  clearFileInput();
  dom.modalEntry.style.display = 'flex';
  setTimeout(() => dom.entryTitleInput.focus(), 50);
}

function closeEntryModal() {
  dom.modalEntry.style.display = 'none';

// ─── File drop helpers ────────────────────────────────────────────────────────
function onFileChange(e) {
  const file = e.target.files[0];
  if (file) setFileInput(file);
}

function setFileInput(file) {
  // Set file onto the real input via DataTransfer (for programmatic set)
  try {
    const dt = new DataTransfer();
    dt.items.add(file);
    dom.entryAudioInput.files = dt.files;
  } catch (_) { /* Safari fallback — just show name */ }
  dom.fileDropBody.style.display = 'none';
  dom.fileSelected.style.display = 'flex';
  dom.fileSelectedName.textContent = file.name;
  dom.errEntryAudio.textContent = '';
}

function clearFileInput() {
  dom.entryAudioInput.value = '';
  dom.fileDropBody.style.display = 'flex';
  dom.fileSelected.style.display = 'none';
  dom.fileSelectedName.textContent = '';
}

// ─── CRUD handlers ────────────────────────────────────────────────────────────
async function handleCreateProject(e) {
  e.preventDefault();
  const name = dom.projectNameInput.value.trim();

  if (!name) {
    dom.errProjectName.textContent = 'Tên project không được để trống.';
    dom.projectNameInput.classList.add('is-error');
    return;
  }

  dom.btnSubmitProject.disabled = true;
  try {
    const project = await api.post('/api/projects', {
      name,
      description: dom.projectDescInput.value.trim() || null,
    });
    state.projects.unshift(project);
    renderProjectList();
    closeProjectModal();
    selectProject(project.id);
  } catch (err) {
    dom.errProjectName.textContent = err.message;
  } finally {
    dom.btnSubmitProject.disabled = false;
  }
}

async function handleDeleteProject() {
  const project = state.projects.find(p => p.id === state.activeProjectId);
  if (!project) return;
  if (!confirm(`Xóa project "${project.name}"? Tất cả bản ghi sẽ bị xóa.`)) return;

  try {
    await api.delete(`/api/projects/${state.activeProjectId}`);
    state.projects = state.projects.filter(p => p.id !== state.activeProjectId);
    state.activeProjectId = null;
    closePlayer();
    dom.projectView.style.display = 'none';
    dom.emptyState.style.display = 'flex';
    renderProjectList();
  } catch (err) {
    alert('Xóa thất bại: ' + err.message);
  }
}

async function handleAddEntry(e) {
  e.preventDefault();
  const title = dom.entryTitleInput.value.trim();
  const file = dom.entryAudioInput.files[0];

  let valid = true;
  if (!title) {
    dom.errEntryTitle.textContent = 'Tiêu đề không được để trống.';
    dom.entryTitleInput.classList.add('is-error');
    valid = false;
  }
  if (!file) {
    dom.errEntryAudio.textContent = 'Vui lòng chọn file âm thanh.';
    valid = false;
  }
  if (!valid) return;

  dom.btnSubmitEntryText.style.display = 'none';
  dom.btnSubmitEntryLoad.style.display = 'inline-flex';
  dom.btnSubmitEntry.disabled = true;

  try {
    const formData = new FormData();
    formData.append('title', title);
    formData.append('text_content', dom.entryTextInput.value.trim());
    formData.append('audio_file', file);

    const entry = await api.uploadForm(`/api/projects/${state.activeProjectId}/entries`, formData);
    state.entries.unshift(entry);
    renderEntries();
    closeEntryModal();
  } catch (err) {
    dom.errEntryAudio.textContent = 'Lỗi khi lưu: ' + err.message;
  } finally {
    dom.btnSubmitEntryText.style.display = 'inline';
    dom.btnSubmitEntryLoad.style.display = 'none';
    dom.btnSubmitEntry.disabled = false;
  }
}

async function handleDeleteEntry(entryId) {
  if (!confirm('Xóa bản ghi này?')) return;
  if (state.playingEntryId === entryId) closePlayer();

  try {
    await api.delete(`/api/projects/${state.activeProjectId}/entries/${entryId}`);
    state.entries = state.entries.filter(e => e.id !== entryId);
    renderEntries();
  } catch (err) {
    alert('Xóa thất bại: ' + err.message);
  }
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

function formatDate(dateString) {
  const d = new Date(dateString);
  return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

</script>
</body>
</html>
