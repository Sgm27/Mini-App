<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SONATA — Music Player</title>
  <meta name="description" content="Trình nghe nhạc trực tuyến SONATA — Âm nhạc đỉnh cao trong tầm tay." />
  <link rel="canonical" href="http://localhost:8386/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   SONATA — Music Player
   Dark luxury aesthetic · Cormorant Garamond + Space Mono
   ============================================================ */

:root {
  --bg:        #0a0a0c;
  --surface:   #111116;
  --surface2:  #18181f;
  --border:    #2a2a35;
  --amber:     #d4a843;
  --amber-dim: #8a6a22;
  --amber-glow:rgba(212,168,67,0.15);
  --text:      #e8e4d8;
  --text-dim:  #7a7568;
  --text-faint:#3a3830;
  --red:       #c0392b;
  --white:     #f5f0e8;

  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-mono:  'Space Mono', 'Courier New', monospace;

  --sidebar-w: 220px;
  --player-h:  88px;
  --radius:    6px;
  --transition: 200ms ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  overflow-x: hidden;
}

.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 60% 40% at 20% 50%, rgba(212,168,67,0.06) 0%, transparent 70%),
              radial-gradient(ellipse 40% 60% at 80% 20%, rgba(100,80,200,0.04) 0%, transparent 70%);
}
.noise {
  position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 128px 128px;
}

.layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: calc(100vh - var(--player-h));
  position: relative;
  z-index: 2;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 28px 0;
}

.brand { display: flex; align-items: center; gap: 10px; padding: 0 24px 32px; }
.brand__icon { font-size: 22px; color: var(--amber); }
.brand__name { font-family: var(--font-serif); font-size: 20px; font-weight: 600; letter-spacing: 0.2em; color: var(--amber); }

.nav { flex: 1; display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
.nav__item {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 10px 14px; border: 1px solid transparent; border-radius: var(--radius);
  background: transparent; color: var(--text-dim); font-family: var(--font-mono);
  font-size: 12px; letter-spacing: 0.05em; cursor: pointer; text-align: left;
  transition: var(--transition);
}
.nav__item:hover { background: var(--surface2); color: var(--text); }
.nav__item--active { background: var(--amber-glow); color: var(--amber); border-color: rgba(212,168,67,0.2); }
.nav__icon { font-size: 14px; }

.sidebar__footer { padding: 24px; margin-top: auto; }
.eq-bars { display: flex; align-items: flex-end; gap: 3px; height: 20px; }
.eq-bar { width: 3px; background: var(--amber-dim); border-radius: 2px; animation: eq 1.2s ease-in-out infinite; animation-play-state: paused; }
.eq-bars.playing .eq-bar { animation-play-state: running; }
.eq-bar:nth-child(1) { height: 40%; animation-delay: 0s; }
.eq-bar:nth-child(2) { height: 70%; animation-delay: 0.2s; }
.eq-bar:nth-child(3) { height: 55%; animation-delay: 0.4s; }
.eq-bar:nth-child(4) { height: 80%; animation-delay: 0.1s; }
.eq-bar:nth-child(5) { height: 45%; animation-delay: 0.3s; }
@keyframes eq { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(2.2); } }

/* ── Main ── */
.main { overflow-y: auto; overflow-x: hidden; padding: 36px 40px; position: relative; }
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.view { display: none; }
.view.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.view__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; gap: 16px; }
.view__title { font-family: var(--font-serif); font-size: 32px; font-weight: 300; letter-spacing: 0.04em; color: var(--white); }

.search-bar { flex: 1; max-width: 320px; }
.search-input {
  width: 100%; padding: 9px 14px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 12px;
  outline: none; transition: var(--transition);
}
.search-input:focus { border-color: var(--amber-dim); }
.search-input::placeholder { color: var(--text-faint); }

/* ── Song list ── */
.song-list { display: flex; flex-direction: column; gap: 2px; }
.song-item {
  display: grid; grid-template-columns: 36px 48px 1fr auto auto;
  align-items: center; gap: 14px; padding: 10px 14px;
  border-radius: var(--radius); cursor: pointer; transition: var(--transition);
  border: 1px solid transparent;
}
.song-item:hover { background: var(--surface2); border-color: var(--border); }
.song-item.playing { background: var(--amber-glow); border-color: rgba(212,168,67,0.25); }
.song-item__num { font-size: 11px; color: var(--text-faint); text-align: center; font-variant-numeric: tabular-nums; }
.song-item.playing .song-item__num { color: var(--amber); }
.song-item__cover {
  width: 40px; height: 40px; border-radius: 4px; object-fit: cover;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-faint); font-size: 16px; flex-shrink: 0; overflow: hidden;
}
.song-item__cover img { width: 100%; height: 100%; object-fit: cover; }
.song-item__info { min-width: 0; }
.song-item__title { font-family: var(--font-serif); font-size: 15px; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-item.playing .song-item__title { color: var(--amber); }
.song-item__artist { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.song-item__duration { font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; white-space: nowrap; }
.song-item__actions { display: flex; gap: 6px; opacity: 0; transition: var(--transition); }
.song-item:hover .song-item__actions { opacity: 1; }

.icon-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 14px; transition: var(--transition); }
.icon-btn:hover { color: var(--text); background: var(--border); }
.icon-btn.danger:hover { color: var(--red); }

/* ── Playlist grid ── */
.playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-bottom: 32px; }
.playlist-card { cursor: pointer; transition: var(--transition); }
.playlist-card:hover .playlist-card__cover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
.playlist-card__cover {
  width: 100%; aspect-ratio: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
  font-size: 40px; color: var(--amber-dim); margin-bottom: 10px; transition: var(--transition); overflow: hidden;
}
.playlist-card__cover img { width: 100%; height: 100%; object-fit: cover; }
.playlist-card__name { font-family: var(--font-serif); font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.playlist-card__count { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* ── Playlist detail ── */
.playlist-detail__header { display: flex; gap: 28px; align-items: flex-end; margin-bottom: 32px; margin-top: 16px; }
.playlist-detail__cover {
  width: 160px; height: 160px; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
  font-size: 56px; color: var(--amber-dim); overflow: hidden;
}
.playlist-detail__cover img { width: 100%; height: 100%; object-fit: cover; }
.playlist-detail__meta { min-width: 0; }
.playlist-detail__label { font-size: 10px; letter-spacing: 0.2em; color: var(--amber); margin-bottom: 6px; }
.playlist-detail__name { font-family: var(--font-serif); font-size: 36px; font-weight: 300; color: var(--white); }
.playlist-detail__desc { font-size: 12px; color: var(--text-dim); margin: 8px 0 20px; }
.playlist-detail__actions { display: flex; gap: 10px; flex-wrap: wrap; }

.back-btn { background: none; border: none; color: var(--text-dim); font-family: var(--font-mono); font-size: 12px; cursor: pointer; padding: 0; transition: var(--transition); }
.back-btn:hover { color: var(--text); }

/* ── Buttons ── */
.btn { padding: 9px 18px; border-radius: var(--radius); font-family: var(--font-mono); font-size: 12px; cursor: pointer; border: 1px solid transparent; transition: var(--transition); letter-spacing: 0.05em; white-space: nowrap; }
.btn--primary { background: var(--amber); color: #0a0a0c; border-color: var(--amber); font-weight: 700; }
.btn--primary:hover { background: #e6b84e; }
.btn--play { background: var(--amber); color: #0a0a0c; font-weight: 700; border-color: var(--amber); }
.btn--play:hover { background: #e6b84e; }
.btn--ghost { background: transparent; color: var(--text); border-color: var(--border); }
.btn--ghost:hover { border-color: var(--amber-dim); color: var(--amber); }
.btn--danger { background: transparent; color: var(--text-dim); border-color: var(--border); }
.btn--danger:hover { border-color: var(--red); color: var(--red); }
.btn--full { width: 100%; display: block; text-align: center; }

/* ── Upload form ── */
.upload-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px; max-width: 680px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 11px; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
.form-input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 13px; outline: none; transition: var(--transition); }
.form-input:focus { border-color: var(--amber-dim); }
.form-input::placeholder { color: var(--text-faint); }
.form-textarea { resize: vertical; min-height: 80px; }

.file-drop { border: 1px dashed var(--border); border-radius: var(--radius); padding: 32px 20px; text-align: center; cursor: pointer; transition: var(--transition); background: var(--surface2); }
.file-drop:hover { border-color: var(--amber-dim); background: rgba(212,168,67,0.05); }
.file-drop--cover { padding: 20px; }
.file-drop__icon { font-size: 32px; color: var(--amber-dim); margin-bottom: 8px; }
.file-drop__text { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
.file-drop__hint { font-size: 11px; color: var(--text-faint); }
.file-drop__name { font-size: 12px; color: var(--amber); margin-top: 8px; }
.cover-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 4px; margin: 0 auto; display: block; }

.upload-progress { margin-bottom: 20px; }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
.progress-bar__fill { height: 100%; background: var(--amber); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
.progress-text { font-size: 11px; color: var(--text-dim); text-align: center; }

.form-error { color: var(--red); font-size: 12px; padding: 10px 14px; background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); border-radius: var(--radius); margin-bottom: 16px; }

/* ── Player ── */
.player {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--player-h);
  background: var(--surface); border-top: 1px solid var(--border);
  display: grid; grid-template-columns: 1fr 280px 1fr;
  align-items: center; padding: 0 24px; gap: 16px; z-index: 100;
}

.player__track { display: flex; align-items: center; gap: 14px; min-width: 0; }
.player__cover { width: 56px; height: 56px; flex-shrink: 0; border-radius: 50%; overflow: hidden; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
.player__cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.vinyl {
  width: 56px; height: 56px; border-radius: 50%;
  background: radial-gradient(circle at center, #1a1a1a 0%, #1a1a1a 20%, #111 21%, #111 40%, #222 41%, #222 60%, #111 61%, #111 80%, #222 81%);
  display: flex; align-items: center; justify-content: center;
  animation: spin 4s linear infinite; animation-play-state: paused;
}
.vinyl.spinning { animation-play-state: running; }
.vinyl__label { width: 20px; height: 20px; border-radius: 50%; background: var(--amber-dim); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #0a0a0c; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.player__info { min-width: 0; }
.player__title { font-family: var(--font-serif); font-size: 15px; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player__artist { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.player__controls { display: flex; align-items: center; justify-content: center; gap: 8px; }
.ctrl-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; padding: 6px; border-radius: 50%; transition: var(--transition); line-height: 1; }
.ctrl-btn:hover { color: var(--text); }
.ctrl-btn--play { width: 40px; height: 40px; background: var(--amber); color: #0a0a0c; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.ctrl-btn--play:hover { background: #e6b84e; }
.ctrl-btn.active { color: var(--amber); }

.player__right { display: flex; flex-direction: column; gap: 8px; justify-content: center; }
.progress-area { display: flex; align-items: center; gap: 8px; }
.time { font-size: 10px; color: var(--text-dim); font-variant-numeric: tabular-nums; white-space: nowrap; }

.seek-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; cursor: pointer; position: relative; overflow: visible; }
.seek-bar__fill { height: 100%; background: var(--amber); border-radius: 2px; width: 0%; pointer-events: none; }
.seek-bar__thumb { position: absolute; top: 50%; left: 0%; transform: translate(-50%, -50%); width: 10px; height: 10px; border-radius: 50%; background: var(--amber); opacity: 0; transition: opacity 0.15s; pointer-events: none; }
.seek-bar:hover .seek-bar__thumb { opacity: 1; }

.volume-area { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.vol-icon { cursor: pointer; font-size: 14px; }
.vol-bar { width: 80px; height: 3px; background: var(--border); border-radius: 2px; cursor: pointer; position: relative; }
.vol-bar__fill { height: 100%; background: var(--text-dim); border-radius: 2px; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
.modal__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.modal__title { font-family: var(--font-serif); font-size: 22px; font-weight: 300; color: var(--white); }
.modal__close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 4px; transition: var(--transition); }
.modal__close:hover { color: var(--text); background: var(--surface2); }
.song-list--modal { max-height: 400px; overflow-y: auto; }

/* ── Utilities ── */
.hidden { display: none !important; }
.state-msg { padding: 60px 20px; text-align: center; color: var(--text-faint); font-family: var(--font-serif); font-size: 18px; font-style: italic; }
.state-msg small { display: block; font-family: var(--font-mono); font-size: 11px; margin-top: 6px; font-style: normal; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto; }

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding: 20px; }
  .player { grid-template-columns: 1fr 200px; }
  .player__right { display: none; }
  .form-row { grid-template-columns: 1fr; }
  .view__title { font-size: 24px; }
}

</style>
</head>
<body>
  <div class="ambient" id="ambient"></div>
  <div class="noise"></div>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand__icon">♫</span>
        <span class="brand__name">SONATA</span>
      </div>

      <nav class="nav">
        <button class="nav__item nav__item--active" data-view="library" onclick="switchView('library')">
          <span class="nav__icon">◈</span> Thư viện
        </button>
        <button class="nav__item" data-view="playlists" onclick="switchView('playlists')">
          <span class="nav__icon">◇</span> Playlist
        </button>
        <button class="nav__item" data-view="upload" onclick="switchView('upload')">
          <span class="nav__icon">⊕</span> Thêm nhạc
        </button>
      </nav>

      <div class="sidebar__footer">
        <div class="eq-bars" id="eqBars">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <!-- Library view -->
      <section class="view active" id="view-library">
        <div class="view__header">
          <h1 class="view__title">Thư viện âm nhạc</h1>
          <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Tìm kiếm bài hát..." oninput="filterSongs(this.value)" />
          </div>
        </div>
        <div class="song-list" id="songList"></div>
      </section>

      <!-- Playlists view -->
      <section class="view" id="view-playlists">
        <div class="view__header">
          <h2 class="view__title">Playlist của bạn</h2>
          <button class="btn btn--primary" onclick="openCreatePlaylistModal()">+ Tạo playlist</button>
        </div>
        <div class="playlist-grid" id="playlistGrid"></div>

        <!-- Playlist detail -->
        <div class="playlist-detail hidden" id="playlistDetail">
          <button class="back-btn" onclick="closePlaylistDetail()">← Quay lại</button>
          <div class="playlist-detail__header">
            <div class="playlist-detail__cover" id="detailCover"></div>
            <div class="playlist-detail__meta">
              <p class="playlist-detail__label">PLAYLIST</p>
              <h2 class="playlist-detail__name" id="detailName"></h2>
              <p class="playlist-detail__desc" id="detailDesc"></p>
              <div class="playlist-detail__actions">
                <button class="btn btn--play" onclick="playPlaylist()">▶ Phát tất cả</button>
                <button class="btn btn--ghost" onclick="openAddSongModal()">+ Thêm bài</button>
                <button class="btn btn--danger" onclick="deleteCurrentPlaylist()">✕ Xóa</button>
              </div>
            </div>
          </div>
          <div class="song-list" id="playlistSongs"></div>
        </div>
      </section>

      <!-- Upload view -->
      <section class="view" id="view-upload">
        <div class="view__header">
          <h2 class="view__title">Thêm bài hát mới</h2>
        </div>
        <div class="upload-card">
          <form id="uploadForm" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Tên bài hát *</label>
                <input type="text" name="title" class="form-input" placeholder="Tên bài hát" required />
              </div>
              <div class="form-group">
                <label class="form-label">Nghệ sĩ</label>
                <input type="text" name="artist" class="form-input" placeholder="Tên nghệ sĩ" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Album</label>
                <input type="text" name="album" class="form-input" placeholder="Tên album" />
              </div>
              <div class="form-group">
                <label class="form-label">Thể loại</label>
                <input type="text" name="genre" class="form-input" placeholder="Pop, Rock, Jazz..." />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">File âm thanh *</label>
              <div class="file-drop" id="audioDrop" onclick="document.getElementById('audioFile').click()">
                <div class="file-drop__icon">♪</div>
                <p class="file-drop__text">Kéo thả hoặc click để chọn file âm thanh</p>
                <p class="file-drop__hint">MP3, WAV, OGG, FLAC</p>
                <div class="file-drop__name hidden" id="audioFileName"></div>
              </div>
              <input type="file" id="audioFile" accept="audio/*" style="display:none" onchange="handleAudioSelect(this)" />
            </div>

            <div class="form-group">
              <label class="form-label">Ảnh bìa (tuỳ chọn)</label>

  <script>
/**
 * API Helper Module
 * Handles all communication with the backend
 *
 * Usage in app.js:
 *   api.get('/api/health')
 *   api.post('/api/items', { name: 'Item 1' })
 *   api.put('/api/items/1', { name: 'Updated' })
 *   api.delete('/api/items/1')
 *   api.uploadForm('/api/upload', formData)
 *
 * Upload to S3 via presigned URL:
 *   const { upload_url, file_url } = await api.post('/api/upload/presigned-url', { filename: 'photo.jpg' });
 *   await fetch(upload_url, { method: 'PUT', body: fileBlob, headers: { 'Content-Type': 'image/jpeg' } });
 */

const API_URL = 'https://c63xiibdwbrb2vkhrsuqlg6zqy0peplp.lambda-url.ap-southeast-1.on.aws';

/**
 * Process response: check status and parse JSON
 */
async function processResponse(response) {
  const data = await response.json();

  if (!response.ok) {
    throw new Error(
      data?.detail || data?.error || `HTTP ${response.status}`
    );
  }

  if (data && data.error) {
    throw new Error(data.error);
  }

  return data;
}

const api = {
  /**
   * Make a GET request
   * @param {string} path - API path (e.g., '/api/health')
   * @param {object} params - Query parameters
   * @returns {Promise<any>} Response data
   */
  async get(path, params = {}) {
    const url = new URL(`${API_URL}${path}`);
    Object.entries(params).forEach(([key, value]) => {
      if (value !== undefined && value !== null) {
        url.searchParams.append(key, value);
      }
    });

    const response = await fetch(url.toString());
    return processResponse(response);
  },

  /**
   * Make a POST request
   * @param {string} path - API path (e.g., '/api/items')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async post(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a PUT request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async put(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a DELETE request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Optional request body
   * @returns {Promise<any>} Response data
   */
  async delete(path, body = null) {
    const options = { method: 'DELETE' };
    if (body) {
      options.headers = { 'Content-Type': 'application/json' };
      options.body = JSON.stringify(body);
    }

    const response = await fetch(`${API_URL}${path}`, options);
    return processResponse(response);
  },

  /**
   * Upload files with FormData
   * @param {string} path - API path (e.g., '/api/upload')
   * @param {FormData} formData - FormData object with files and fields
   * @returns {Promise<any>} Response data
   */
  async uploadForm(path, formData) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      body: formData,
    });
    return processResponse(response);
  },
};

// Export for use in other modules
window.api = api;

</script>
  <script>
/* ============================================================
   SONATA — Music Player App Logic
   ============================================================ */

// ── State ──
let allSongs = [];
let queue = [];
let currentIndex = -1;
let isPlaying = false;
let isShuffle = false;
let isRepeat = false;
let isMuted = false;
let currentPlaylistId = null;
let audioFile = null;
let coverFile = null;

const audio = document.getElementById('audioEl');

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  loadSongs();
  setupAudioEvents();
  setupUploadForm();
  setupPlaylistForm();
});

// ── View switching ──
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav__item').forEach(n => n.classList.remove('nav__item--active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector(`[data-view="${name}"]`).classList.add('nav__item--active');

  if (name === 'playlists') loadPlaylists();
}

// ── Library ──
async function loadSongs() {
  const container = document.getElementById('songList');
  container.innerHTML = '<div class="spinner"></div>';
  try {
    allSongs = await api.get('/api/songs');
    renderSongs(allSongs, container);
  } catch (e) {
    container.innerHTML = `<div class="state-msg">Không thể tải nhạc<small>${escapeHtml(e.message)}</small></div>`;
  }
}

function renderSongs(songs, container, opts = {}) {
  if (!songs.length) {
    container.innerHTML = '<div class="state-msg">Chưa có bài hát nào<small>Hãy thêm nhạc vào thư viện</small></div>';
    return;
  }
  container.innerHTML = songs.map((s, i) => `
    <div class="song-item ${isCurrentSong(s.id) ? 'playing' : ''}"
         onclick="playSong(${i}, ${JSON.stringify(songs).replace(/"/g, '&quot;')})">
      <span class="song-item__num">${isCurrentSong(s.id) ? '♪' : (i + 1)}</span>
      <div class="song-item__cover">
        ${s.cover_url ? `<img src="${escapeHtml(s.cover_url)}" alt="" loading="lazy" />` : '♫'}
      </div>
      <div class="song-item__info">
        <div class="song-item__title">${escapeHtml(s.title)}</div>
        <div class="song-item__artist">${escapeHtml(s.artist || '—')}</div>
      </div>
      <span class="song-item__duration">${formatDuration(s.duration)}</span>
      <div class="song-item__actions">
        ${opts.playlistId ? `
          <button class="icon-btn danger" title="Xóa khỏi playlist"
            onclick="event.stopPropagation(); removeSongFromPlaylist(${opts.playlistId}, ${s.id})">✕</button>
        ` : `
          <button class="icon-btn danger" title="Xóa bài hát"
            onclick="event.stopPropagation(); deleteSong(${s.id})">🗑</button>
        `}
      </div>
    </div>
  `).join('');
}

function filterSongs(q) {
  const filtered = q
    ? allSongs.filter(s =>
        s.title.toLowerCase().includes(q.toLowerCase()) ||
        (s.artist || '').toLowerCase().includes(q.toLowerCase())
      )
    : allSongs;
  renderSongs(filtered, document.getElementById('songList'));
}

async function deleteSong(id) {
  if (!confirm('Xóa bài hát này?')) return;
  try {
    await api.delete(`/api/songs/${id}`);
    if (queue[currentIndex] && queue[currentIndex].id === id) stopPlayer();
    await loadSongs();
  } catch (e) {
    alert('Lỗi: ' + e.message);
  }
}

// ── Player ──
function playSong(index, songList) {
  queue = songList;
  currentIndex = index;
  loadAndPlay(queue[currentIndex]);
}

function loadAndPlay(song) {
  audio.src = song.audio_url;
  audio.load();
  audio.play().catch(() => {});
  updatePlayerUI(song);
}

function updatePlayerUI(song) {
  document.getElementById('playerTitle').textContent = song.title;
  document.getElementById('playerArtist').textContent = song.artist || '—';

  const cover = document.getElementById('playerCover');
  if (song.cover_url) {
    cover.innerHTML = `<img src="${escapeHtml(song.cover_url)}" alt="" />`;
  } else {
    cover.innerHTML = `<div class="vinyl spinning" id="vinyl"><div class="vinyl__label">♫</div></div>`;
  }

  // Re-highlight in list
  document.querySelectorAll('.song-item').forEach(el => el.classList.remove('playing'));
}

function isCurrentSong(id) {
  return queue[currentIndex] && queue[currentIndex].id === id;
}

function togglePlay() {
  if (!audio.src) return;
  if (isPlaying) { audio.pause(); } else { audio.play(); }
}

function prevSong() {
  if (!queue.length) return;
  currentIndex = (currentIndex - 1 + queue.length) % queue.length;
  loadAndPlay(queue[currentIndex]);
}

function nextSong() {
  if (!queue.length) return;
  if (isShuffle) {
    currentIndex = Math.floor(Math.random() * queue.length);
  } else {
    currentIndex = (currentIndex + 1) % queue.length;
  }
  loadAndPlay(queue[currentIndex]);
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('shuffleBtn').classList.toggle('active', isShuffle);
}

function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
  audio.loop = isRepeat;
}

function toggleMute() {
  isMuted = !isMuted;
  audio.muted = isMuted;
  document.getElementById('volIcon').textContent = isMuted ? '🔇' : '🔊';
}

function seek(event) {
  const bar = document.getElementById('seekBar');
  const rect = bar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
  if (audio.duration) audio.currentTime = ratio * audio.duration;
}

function setVolume(event) {
  const bar = document.getElementById('volBar');
  const rect = bar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
  audio.volume = ratio;
  document.getElementById('volFill').style.width = (ratio * 100) + '%';
  if (ratio === 0) { isMuted = true; document.getElementById('volIcon').textContent = '🔇'; }
  else { isMuted = false; audio.muted = false; document.getElementById('volIcon').textContent = '🔊'; }
}

function stopPlayer() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
  document.getElementById('playerTitle').textContent = 'Chưa có bài hát';
  document.getElementById('playerArtist').textContent = '—';
}

function setupAudioEvents() {
  audio.addEventListener('play', () => {
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
    document.getElementById('vinyl')?.classList.add('spinning');
    document.getElementById('eqBars').classList.add('playing');
  });
  audio.addEventListener('pause', () => {
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('vinyl')?.classList.remove('spinning');
    document.getElementById('eqBars').classList.remove('playing');
  });
  audio.addEventListener('ended', () => {
    if (!isRepeat) nextSong();
  });
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('seekFill').style.width = pct + '%';
    document.getElementById('seekThumb').style.left = pct + '%';
    document.getElementById('currentTime').textContent = formatDuration(Math.floor(audio.currentTime));
    document.getElementById('totalTime').textContent = formatDuration(Math.floor(audio.duration));
  });
  audio.addEventListener('loadedmetadata', async () => {
    // auto-save duration if unknown
    const song = queue[currentIndex];
    if (song && !song.duration && audio.duration) {
      try {
        await api.put(`/api/songs/${song.id}`, { duration: Math.floor(audio.duration) });
        song.duration = Math.floor(audio.duration);
      } catch (_) {}
    }
  });
}

// ── Upload ──
function handleAudioSelect(input) {
  audioFile = input.files[0];
  if (!audioFile) return;
  const nameEl = document.getElementById('audioFileName');
  nameEl.textContent = audioFile.name;
  nameEl.classList.remove('hidden');
  document.querySelector('.file-drop__hint').textContent = formatFileSize(audioFile.size);
}

function handleCoverSelect(input) {
  coverFile = input.files[0];
  if (!coverFile) return;
  const preview = document.getElementById('coverPreview');
  preview.src = URL.createObjectURL(coverFile);
  preview.classList.remove('hidden');
  document.getElementById('coverPreviewIcon').classList.add('hidden');
  document.getElementById('coverDropText').classList.add('hidden');
}

function setupUploadForm() {
  document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const title = form.querySelector('[name="title"]').value.trim();
    if (!title) { showUploadError('Vui lòng nhập tên bài hát'); return; }
    if (!audioFile) { showUploadError('Vui lòng chọn file âm thanh'); return; }

    document.getElementById('uploadBtn').disabled = true;
    document.getElementById('uploadBtn').textContent = 'Đang tải lên...';
    document.getElementById('uploadError').classList.add('hidden');
    document.getElementById('uploadProgress').classList.remove('hidden');
    setProgress(0, 'Đang lấy presigned URL...');

    try {
      // Upload audio
      const audioRes = await api.post('/api/upload/presigned-url', { filename: audioFile.name });
      setProgress(20, 'Đang tải file âm thanh...');
      await fetch(audioRes.upload_url, { method: 'PUT', body: audioFile, headers: { 'Content-Type': audioFile.type } });
      setProgress(60, 'Đang tải ảnh bìa...');

      // Upload cover (optional)
      let coverUrl = null;
      if (coverFile) {
        const coverRes = await api.post('/api/upload/presigned-url', { filename: coverFile.name });
        await fetch(coverRes.upload_url, { method: 'PUT', body: coverFile, headers: { 'Content-Type': coverFile.type } });
        coverUrl = coverRes.file_url;
      }

      setProgress(80, 'Đang lưu thông tin...');
      const songData = {
        title,
        artist: form.querySelector('[name="artist"]').value.trim() || 'Unknown',
        album: form.querySelector('[name="album"]').value.trim() || null,
        genre: form.querySelector('[name="genre"]').value.trim() || null,
        audio_url: audioRes.file_url,
        cover_url: coverUrl,
      };
      await api.post('/api/songs', songData);
      setProgress(100, 'Hoàn tất!');

      setTimeout(() => {
        form.reset();
        audioFile = null;
        coverFile = null;
        document.getElementById('audioFileName').classList.add('hidden');
        document.getElementById('coverPreview').classList.add('hidden');
        document.getElementById('coverPreviewIcon').classList.remove('hidden');
        document.getElementById('coverDropText').classList.remove('hidden');
        document.getElementById('uploadProgress').classList.add('hidden');
        document.getElementById('uploadBtn').disabled = false;
        document.getElementById('uploadBtn').textContent = '⊕ Tải lên bài hát';
        loadSongs();
        switchView('library');
      }, 800);
    } catch (err) {
      showUploadError(err.message);
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('uploadBtn').textContent = '⊕ Tải lên bài hát';
      document.getElementById('uploadProgress').classList.add('hidden');
    }
  });
}

function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = msg;
}

function showUploadError(msg) {
  const el = document.getElementById('uploadError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// ── Playlists ──
let playlists = [];

async function loadPlaylists() {
  const container = document.getElementById('playlistGrid');
  container.innerHTML = '<div class="spinner"></div>';
  try {
    playlists = await api.get('/api/playlists');
    renderPlaylists(playlists);
  } catch (e) {
    container.innerHTML = `<div class="state-msg">Lỗi tải playlist<small>${escapeHtml(e.message)}</small></div>`;
  }
}

function renderPlaylists(list) {
  const container = document.getElementById('playlistGrid');
  if (!list.length) {
    container.innerHTML = '<div class="state-msg">Chưa có playlist nào<small>Tạo playlist đầu tiên của bạn</small></div>';
    return;
  }
  container.innerHTML = list.map(p => `
    <div class="playlist-card" onclick="openPlaylistDetail(${p.id})">
      <div class="playlist-card__cover">
        ${p.cover_url ? `<img src="${escapeHtml(p.cover_url)}" alt="" loading="lazy" />` : '◇'}
      </div>
      <div class="playlist-card__name">${escapeHtml(p.name)}</div>
      <div class="playlist-card__count">${p.songs.length} bài hát</div>
    </div>
  `).join('');
}

function openPlaylistDetail(id) {
  currentPlaylistId = id;
  const p = playlists.find(x => x.id === id);
  if (!p) return;

  document.getElementById('playlistGrid').classList.add('hidden');
  document.getElementById('playlistDetail').classList.remove('hidden');

  document.getElementById('detailName').textContent = p.name;
  document.getElementById('detailDesc').textContent = p.description || '';
  const cover = document.getElementById('detailCover');
  cover.innerHTML = p.cover_url ? `<img src="${escapeHtml(p.cover_url)}" alt="" />` : '◇';

  renderSongs(p.songs, document.getElementById('playlistSongs'), { playlistId: id });
}

function closePlaylistDetail() {
  document.getElementById('playlistGrid').classList.remove('hidden');
  document.getElementById('playlistDetail').classList.add('hidden');
  currentPlaylistId = null;
}

function playPlaylist() {
  const p = playlists.find(x => x.id === currentPlaylistId);
  if (!p || !p.songs.length) return;
  queue = p.songs;
  currentIndex = 0;
  loadAndPlay(queue[0]);
}

async function deleteCurrentPlaylist() {
  if (!confirm('Xóa playlist này?')) return;
  try {
    await api.delete(`/api/playlists/${currentPlaylistId}`);
    closePlaylistDetail();
    await loadPlaylists();
  } catch (e) {
    alert('Lỗi: ' + e.message);
  }
}

async function removeSongFromPlaylist(playlistId, songId) {
  try {
    await api.delete(`/api/playlists/${playlistId}/songs/${songId}`);
    const p = playlists.find(x => x.id === playlistId);
    if (p) p.songs = p.songs.filter(s => s.id !== songId);
    openPlaylistDetail(playlistId);
  } catch (e) {
    alert('Lỗi: ' + e.message);
  }
}

// Create playlist modal
function openCreatePlaylistModal() {
  document.getElementById('createPlaylistModal').classList.remove('hidden');
}
function closeCreatePlaylistModal() {
  document.getElementById('createPlaylistModal').classList.add('hidden');
  document.getElementById('createPlaylistForm').reset();
  document.getElementById('createPlaylistError').classList.add('hidden');
}

function setupPlaylistForm() {
  document.getElementById('createPlaylistForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const name = form.querySelector('[name="name"]').value.trim();
    if (!name) {
      const errEl = document.getElementById('createPlaylistError');
      errEl.textContent = 'Vui lòng nhập tên playlist';
      errEl.classList.remove('hidden');
      return;
    }
    try {
      const p = await api.post('/api/playlists', {
        name,
        description: form.querySelector('[name="description"]').value.trim() || null,
      });
      playlists.unshift(p);
      renderPlaylists(playlists);
      closeCreatePlaylistModal();
    } catch (err) {
      const errEl = document.getElementById('createPlaylistError');
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
    }
  });
}

// Add song to playlist modal
function openAddSongModal() {
  document.getElementById('addSongModal').classList.remove('hidden');
  const container = document.getElementById('addSongList');
  const p = playlists.find(x => x.id === currentPlaylistId);
  const existingIds = new Set((p?.songs || []).map(s => s.id));

  if (!allSongs.length) {
    container.innerHTML = '<div class="state-msg">Không có bài hát nào trong thư viện</div>';
    return;
  }
  container.innerHTML = allSongs.map(s => `
    <div class="song-item ${existingIds.has(s.id) ? 'playing' : ''}"
         onclick="${existingIds.has(s.id) ? '' : `addSongToCurrentPlaylist(${s.id})`}"
         style="${existingIds.has(s.id) ? 'opacity:0.5;cursor:default' : ''}">
      <span class="song-item__num">${existingIds.has(s.id) ? '✓' : '+'}</span>
      <div class="song-item__cover">
        ${s.cover_url ? `<img src="${escapeHtml(s.cover_url)}" alt="" loading="lazy" />` : '♫'}
      </div>
      <div class="song-item__info">
        <div class="song-item__title">${escapeHtml(s.title)}</div>
        <div class="song-item__artist">${escapeHtml(s.artist || '—')}</div>
      </div>
      <span class="song-item__duration">${formatDuration(s.duration)}</span>
      <div class="song-item__actions"></div>
    </div>
  `).join('');
}

async function addSongToCurrentPlaylist(songId) {
  try {
    const updated = await api.post(`/api/playlists/${currentPlaylistId}/songs`, { song_id: songId });
    const idx = playlists.findIndex(x => x.id === currentPlaylistId);
    if (idx !== -1) playlists[idx] = updated;
    closeAddSongModal();
    openPlaylistDetail(currentPlaylistId);
  } catch (e) {
    alert('Lỗi: ' + e.message);
  }
}

function closeAddSongModal() {
  document.getElementById('addSongModal').classList.add('hidden');
}

// Close modals on overlay click
document.addEventListener('click', (e) => {
  if (e.target.id === 'createPlaylistModal') closeCreatePlaylistModal();
  if (e.target.id === 'addSongModal') closeAddSongModal();
});

// ── Utilities ──
function escapeHtml(text) {
  if (!text) return '';
  const d = document.createElement('div');
  d.textContent = String(text);
  return d.innerHTML;
}

function formatDuration(seconds) {
  if (!seconds || isNaN(seconds)) return '—';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function formatFileSize(bytes) {
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

</script>
</body>
