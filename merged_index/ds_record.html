<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quản lý project và ghi âm trực tiếp từ trình duyệt">
  <title>SoundVault — Ghi âm theo Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
/* ============================================
   SoundVault — Dark industrial recorder UI
   Font: Syne (display) + DM Mono (data)
   Theme: Dark charcoal + electric amber accent
   ============================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;

  --bg: #0e0f11;
  --bg-surface: #16181c;
  --bg-elevated: #1d2026;
  --bg-hover: #252830;

  --accent: #f0b429;
  --accent-dim: rgba(240, 180, 41, 0.12);
  --accent-glow: rgba(240, 180, 41, 0.35);

  --text: #e8eaf0;
  --text-muted: #7a7f8e;
  --text-dim: #4a4f5c;

  --border: rgba(255,255,255,0.07);
  --border-accent: rgba(240, 180, 41, 0.4);

  --red: #ff4d4d;
  --red-dim: rgba(255, 77, 77, 0.12);
  --green: #4ade80;

  --sidebar-w: 260px;

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;

  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  height: 100%;
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ============================================
   LAYOUT: sidebar + main
   ============================================ */

body {
  display: flex;
}

/* --- SIDEBAR --- */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100vh;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: width 0.3s var(--ease), min-width 0.3s var(--ease), opacity 0.3s;
  overflow: hidden;
  position: relative;
  z-index: 10;
}

.sidebar.collapsed {
  width: 0;
  min-width: 0;
  opacity: 0;
}

.sidebar__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar__logo {
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}

.sidebar__logo-icon {
  font-size: 22px;
  color: var(--accent);
  line-height: 1;
}

.sidebar__logo-text {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text);
}

.sidebar__toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}

.sidebar__toggle:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.sidebar__section {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}

.sidebar__section::-webkit-scrollbar { width: 4px; }
.sidebar__section::-webkit-scrollbar-track { background: transparent; }
.sidebar__section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sidebar__section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 4px 16px 8px;
}

.sidebar__footer {
  padding: 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

/* --- PROJECT LIST in sidebar --- */
.project-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 0 8px;
}

.project-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
  overflow: hidden;
  position: relative;
  border: 1px solid transparent;
}

.project-item:hover { background: var(--bg-hover); }

.project-item.active {
  background: var(--accent-dim);
  border-color: var(--border-accent);
}

.project-item__icon {
  font-size: 14px;
  flex-shrink: 0;
  opacity: 0.6;
}

.project-item.active .project-item__icon { opacity: 1; }

.project-item__info {
  flex: 1;
  overflow: hidden;
}

.project-item__name {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-item.active .project-item__name { color: var(--accent); }

.project-item__count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 1px;
}

.project-item__del {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.project-item:hover .project-item__del { opacity: 1; }
.project-item__del:hover { color: var(--red); background: var(--red-dim); }

/* Skeleton */
.skeleton-list { padding: 4px 0; display: flex; flex-direction: column; gap: 6px; }
.skeleton-item {
  height: 38px;
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* --- MAIN --- */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  min-width: 0;
}

/* --- TOPBAR --- */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  flex-shrink: 0;
}

.topbar__menu-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.topbar__menu-btn:hover { background: var(--bg-hover); color: var(--text); }

.topbar__breadcrumb {
  flex: 1;
  font-size: 13px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar__actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* --- CONTENT AREA --- */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 32px 36px;
}

.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ============================================
   WELCOME SCREEN
   ============================================ */

.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 60vh;
  gap: 20px;
}

.welcome__visual {
  font-size: 72px;
  color: var(--accent);
  opacity: 0.3;
  line-height: 1;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.welcome__title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.welcome__desc {
  color: var(--text-muted);
  max-width: 380px;
  line-height: 1.7;
}

/* ============================================
   PROJECT DETAIL
   ============================================ */

.project-detail {
  display: flex;
  flex-direction: column;
  gap: 28px;
  max-width: 720px;
  animation: fadeUp 0.3s var(--ease);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.project-detail__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.project-detail__name {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}

.project-detail__desc {
  margin-top: 6px;
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.6;
}

/* ============================================
   RECORDER WIDGET
   ============================================ */

.recorder {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: relative;
  overflow: hidden;
}

.recorder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(240,180,41,0.05) 0%, transparent 70%);
  pointer-events: none;
}

.recorder.recording {
  border-color: var(--border-accent);
  box-shadow: 0 0 0 1px var(--border-accent), 0 0 30px rgba(240, 180, 41, 0.08);
}

.recorder__top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.recorder__status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}

.recorder__dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: background 0.3s;
}

.recorder__dot.recording {
  background: var(--red);
  animation: blink 1s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.recorder__timer {
  font-family: var(--font-mono);
  font-size: 32px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 3px;
}

/* Waveform bars */
.recorder__waveform {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 48px;
}

.recorder__waveform span {
  display: block;
  width: 4px;
  background: var(--text-dim);
  border-radius: 2px;
  height: 8px;
  transition: height 0.1s;
}

.recorder.recording .recorder__waveform span {
  background: var(--accent);
  animation: wave 0.8s ease-in-out infinite;
}

.recorder.recording .recorder__waveform span:nth-child(1)  { animation-delay: 0.00s; }
.recorder.recording .recorder__waveform span:nth-child(2)  { animation-delay: 0.08s; }
.recorder.recording .recorder__waveform span:nth-child(3)  { animation-delay: 0.16s; }
.recorder.recording .recorder__waveform span:nth-child(4)  { animation-delay: 0.24s; }
.recorder.recording .recorder__waveform span:nth-child(5)  { animation-delay: 0.32s; }
.recorder.recording .recorder__waveform span:nth-child(6)  { animation-delay: 0.40s; }
.recorder.recording .recorder__waveform span:nth-child(7)  { animation-delay: 0.48s; }
.recorder.recording .recorder__waveform span:nth-child(8)  { animation-delay: 0.56s; }
.recorder.recording .recorder__waveform span:nth-child(9)  { animation-delay: 0.64s; }
.recorder.recording .recorder__waveform span:nth-child(10) { animation-delay: 0.72s; }
.recorder.recording .recorder__waveform span:nth-child(11) { animation-delay: 0.56s; }
.recorder.recording .recorder__waveform span:nth-child(12) { animation-delay: 0.48s; }
.recorder.recording .recorder__waveform span:nth-child(13) { animation-delay: 0.32s; }
.recorder.recording .recorder__waveform span:nth-child(14) { animation-delay: 0.16s; }
.recorder.recording .recorder__waveform span:nth-child(15) { animation-delay: 0.00s; }

@keyframes wave {
  0%, 100% { height: 6px; }
  50% { height: 36px; }
}

.recorder__controls {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.recorder__btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  border: none;
}

.recorder__btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.recorder__btn--record {
  background: var(--accent);
  color: #0e0f11;
}

.recorder__btn--record:not(:disabled):hover {
  background: #ffc93c;
  box-shadow: 0 0 20px var(--accent-glow);
  transform: translateY(-1px);
}

.recorder__btn--stop {
  background: var(--bg-elevated);
  color: var(--text);
  border: 1px solid var(--border);
}

.recorder__btn--stop:not(:disabled):hover {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
}

/* Preview */
.recorder__preview {
  border-top: 1px solid var(--border);
  padding-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  animation: fadeUp 0.3s var(--ease);
}

.recorder__preview audio {
  width: 100%;
  border-radius: var(--radius-sm);
  accent-color: var(--accent);
}

.recorder__preview-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.recorder__preview-btns {
  display: flex;
  gap: 8px;
}

/* ============================================
   RECORDINGS LIST
   ============================================ */

.recordings-section {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.recordings-section__header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.recordings-section__title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.badge {
  background: var(--bg-elevated);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
}

.recordings-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.recording-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 0.2s;
  animation: fadeUp 0.25s var(--ease);
}

.recording-card:hover { border-color: rgba(255,255,255,0.14); }

.recording-card__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.recording-card__name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}

.recording-card__meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.recording-card__time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

.recording-card__del {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all 0.15s;
}

.recording-card__del:hover { color: var(--red); background: var(--red-dim); }

.recording-card audio {
  width: 100%;
  height: 36px;
  accent-color: var(--accent);
}

.recording-card__info {
  display: flex;
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

/* ============================================
   BUTTONS
   ============================================ */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: var(--radius-md);
  font-family: var(--font-display);
  font-size: 13.5px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.2s var(--ease);
  white-space: nowrap;
}

.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn--primary {
  background: var(--accent);
  color: #0e0f11;
}

.btn--primary:not(:disabled):hover {
  background: #ffc93c;
  box-shadow: 0 0 16px var(--accent-glow);
}

.btn--ghost {
  background: var(--bg-elevated);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.btn--ghost:hover { background: var(--bg-hover); color: var(--text); }

.btn--danger {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(255, 77, 77, 0.3);
}

.btn--danger:hover { background: rgba(255,77,77,0.2); }

.btn--create {
  width: 100%;
  background: var(--bg-elevated);
  color: var(--text-muted);
  border: 1px dashed var(--border);
  padding: 10px;
  font-size: 13px;
  font-weight: 600;
  border-radius: var(--radius-md);
  gap: 6px;
}

.btn--create:hover {
  background: var(--accent-dim);
  border-color: var(--border-accent);
  color: var(--accent);
}

.btn--lg { padding: 13px 28px; font-size: 15px; }

.btn--icon {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  font-size: 13px;
}

.btn--icon:hover { background: var(--bg-hover); color: var(--text); }

/* ============================================
   INPUTS
   ============================================ */

.input {
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text);
  font-family: var(--font-display);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
}

.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text-dim); }

.input--textarea {
  resize: vertical;
  min-height: 80px;
}

/* ============================================
   FIELDS
   ============================================ */

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field__label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  text-transform: uppercase;
}

.field__error {
  font-size: 12px;
  color: var(--red);
  min-height: 16px;
}

.required { color: var(--red); }

/* ============================================
   MODAL
   ============================================ */

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 460px;
  margin: 16px;
  animation: slideUp 0.25s var(--ease);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal--sm { max-width: 360px; }

.modal__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 0;
}

.modal__title {
  font-size: 17px;
  font-weight: 800;
}

.modal__close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  transition: color 0.15s;
}

.modal__close:hover { color: var(--text); }

.modal__body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.modal__body p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }

.modal__footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* ============================================
   EMPTY STATE
   ============================================ */

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 36px 20px;
  color: var(--text-dim);
  font-size: 14px;
  text-align: center;
  border: 1px dashed var(--border);
  border-radius: var(--radius-lg);
}

.empty-state__icon { font-size: 36px; opacity: 0.5; }
.empty-state strong { color: var(--accent); }

/* ============================================
   TOAST NOTIFICATIONS
   ============================================ */

.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 200;
}

.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 18px;
  border-radius: var(--radius-md);
  font-size: 13.5px;
  font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: toastIn 0.3s var(--ease);

  <script>
/**
 * API Helper Module
 * Handles all communication with the backend
 *
 * Usage in app.js:
 *   api.get('/api/health')
 *   api.post('/api/items', { name: 'Item 1' })
 *   api.put('/api/items/1', { name: 'Updated' })
 *   api.delete('/api/items/1')
 *   api.uploadForm('/api/upload', formData)
 *
 * Upload to S3 via presigned URL:
 *   const { upload_url, file_url } = await api.post('/api/upload/presigned-url', { filename: 'photo.jpg' });
 *   await fetch(upload_url, { method: 'PUT', body: fileBlob, headers: { 'Content-Type': 'image/jpeg' } });
 */

const API_URL = 'https://p7rmq32a4uajhp6os5kgb3iubu0hnmwp.lambda-url.ap-southeast-1.on.aws';

/**
 * Process response: check status and parse JSON
 */
async function processResponse(response) {
  const data = await response.json();

  if (!response.ok) {
    throw new Error(
      data?.detail || data?.error || `HTTP ${response.status}`
    );
  }

  if (data && data.error) {
    throw new Error(data.error);
  }

  return data;
}

const api = {
  /**
   * Make a GET request
   * @param {string} path - API path (e.g., '/api/health')
   * @param {object} params - Query parameters
   * @returns {Promise<any>} Response data
   */
  async get(path, params = {}) {
    const url = new URL(`${API_URL}${path}`);
    Object.entries(params).forEach(([key, value]) => {
      if (value !== undefined && value !== null) {
        url.searchParams.append(key, value);
      }
    });

    const response = await fetch(url.toString());
    return processResponse(response);
  },

  /**
   * Make a POST request
   * @param {string} path - API path (e.g., '/api/items')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async post(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a PUT request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async put(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a DELETE request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Optional request body
   * @returns {Promise<any>} Response data
   */
  async delete(path, body = null) {
    const options = { method: 'DELETE' };
    if (body) {
      options.headers = { 'Content-Type': 'application/json' };
      options.body = JSON.stringify(body);
    }

    const response = await fetch(`${API_URL}${path}`, options);
    return processResponse(response);
  },

  /**
   * Upload files with FormData
   * @param {string} path - API path (e.g., '/api/upload')
   * @param {FormData} formData - FormData object with files and fields
   * @returns {Promise<any>} Response data
   */
  async uploadForm(path, formData) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      body: formData,
    });
    return processResponse(response);
  },
};

// Export for use in other modules
window.api = api;

</script>
  <script>
/**
 * SoundVault — Main Application
 * Project management + Audio recording with S3 upload
 */

// ============================================================
// STATE
// ============================================================
let projects = [];
let currentProjectId = null;
let mediaRecorder = null;
let audioChunks = [];
let recordingBlob = null;
let recordingDuration = 0;
let timerInterval = null;
let timerStart = null;

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  setupSidebar();
  setupModal();
  setupDeleteModal();
  setupRecorder();
  loadProjects();
});

// ============================================================
// UTILS
// ============================================================
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text ?? '';
  return div.innerHTML;
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('vi-VN', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function formatDuration(seconds) {
  if (!seconds) return '—';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function formatBytes(bytes) {
  if (!bytes) return '—';
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast--${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toastOut 0.3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

// ============================================================
// SIDEBAR
// ============================================================
function setupSidebar() {
  const sidebar = document.getElementById('sidebar');
  const toggleBtn = document.getElementById('sidebarToggle');
  const openBtn = document.getElementById('sidebarOpenBtn');

  toggleBtn.addEventListener('click', () => {
    sidebar.classList.add('collapsed');
    openBtn.style.display = 'flex';
  });

  openBtn.addEventListener('click', () => {
    sidebar.classList.remove('collapsed');
    openBtn.style.display = 'none';
  });

  document.getElementById('openCreateProject').addEventListener('click', openCreateModal);
  document.getElementById('welcomeCreateBtn').addEventListener('click', openCreateModal);
}

// ============================================================
// PROJECTS
// ============================================================
async function loadProjects() {
  try {
    projects = await api.get('/api/projects');
    renderProjectList();
    if (currentProjectId) {
      const exists = projects.find(p => p.id === currentProjectId);
      if (exists) openProject(currentProjectId);
      else showWelcome();
    } else {
      showWelcome();
    }
  } catch (err) {
    showToast('Không thể tải danh sách project: ' + err.message, 'error');
  }
}

function renderProjectList() {
  const list = document.getElementById('projectList');
  if (!projects.length) {
    list.innerHTML = `<div style="padding:8px 10px;font-size:12px;color:var(--text-dim)">Chưa có project nào.</div>`;
    return;
  }
  list.innerHTML = projects.map(p => `
    <div class="project-item ${p.id === currentProjectId ? 'active' : ''}" data-id="${p.id}" onclick="openProject(${p.id})">
      <span class="project-item__icon">📁</span>
      <div class="project-item__info">
        <div class="project-item__name">${escapeHtml(p.name)}</div>
        <div class="project-item__count">${p.recording_count} bản ghi</div>
      </div>
      <button class="project-item__del" title="Xoá project" onclick="event.stopPropagation(); confirmDeleteProject(${p.id}, '${escapeHtml(p.name)}')">✕</button>
    </div>
  `).join('');
}

function showWelcome() {
  currentProjectId = null;
  document.getElementById('welcomeScreen').style.display = 'flex';
  document.getElementById('projectDetail').style.display = 'none';
  document.getElementById('topbarBreadcrumb').innerHTML = `<span>SoundVault</span>`;
  document.getElementById('topbarActions').innerHTML = '';
  renderProjectList();
}

async function openProject(projectId) {
  currentProjectId = projectId;
  const project = projects.find(p => p.id === projectId);
  if (!project) return;

  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('projectDetail').style.display = 'flex';

  document.getElementById('detailProjectName').textContent = project.name;
  document.getElementById('detailProjectDesc').textContent = project.description || '';

  document.getElementById('topbarBreadcrumb').innerHTML = `
    <span style="color:var(--text-dim)">Projects</span>
    <span style="color:var(--text-dim)">›</span>
    <span>${escapeHtml(project.name)}</span>
  `;

  document.getElementById('topbarActions').innerHTML = `
    <button class="btn btn--icon" onclick="openEditModal(${project.id})" title="Sửa project">✎ Sửa</button>
  `;

  renderProjectList();
  resetRecorder();
  await loadRecordings(projectId);
}

// ============================================================
// CREATE / EDIT PROJECT MODAL
// ============================================================
let editingProjectId = null;

function openCreateModal() {
  editingProjectId = null;
  document.getElementById('modalTitle').textContent = 'Tạo project mới';
  document.getElementById('modalSubmit').textContent = 'Tạo';
  document.getElementById('projectName').value = '';
  document.getElementById('projectDesc').value = '';
  document.getElementById('projectNameError').textContent = '';
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('projectName').focus(), 50);
}

function openEditModal(projectId) {
  const project = projects.find(p => p.id === projectId);
  if (!project) return;
  editingProjectId = projectId;
  document.getElementById('modalTitle').textContent = 'Sửa project';
  document.getElementById('modalSubmit').textContent = 'Lưu';
  document.getElementById('projectName').value = project.name;
  document.getElementById('projectDesc').value = project.description || '';
  document.getElementById('projectNameError').textContent = '';
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('projectName').focus(), 50);
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

function setupModal() {
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  document.getElementById('projectForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('projectName').value.trim();
    const description = document.getElementById('projectDesc').value.trim();
    const errEl = document.getElementById('projectNameError');

    if (!name) {
      errEl.textContent = 'Tên project không được để trống.';
      document.getElementById('projectName').focus();
      return;
    }
    errEl.textContent = '';

    const btn = document.getElementById('modalSubmit');
    btn.disabled = true;
    btn.textContent = 'Đang lưu...';

    try {
      if (editingProjectId) {
        await api.put(`/api/projects/${editingProjectId}`, { name, description: description || null });
        showToast('Đã cập nhật project!');
      } else {
        const created = await api.post('/api/projects', { name, description: description || null });
        showToast('Đã tạo project!');
        await loadProjects();
        closeModal();
        openProject(created.id);
        return;
      }
      await loadProjects();
      closeModal();
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = editingProjectId ? 'Lưu' : 'Tạo';
    }
  });
}

// ============================================================
// DELETE PROJECT
// ============================================================
let deleteCallback = null;

function setupDeleteModal() {
  document.getElementById('deleteCancelBtn').addEventListener('click', () => {
    document.getElementById('deleteOverlay').style.display = 'none';
    deleteCallback = null;
  });
  document.getElementById('deleteConfirmBtn').addEventListener('click', async () => {
    if (deleteCallback) {
      const btn = document.getElementById('deleteConfirmBtn');
      btn.disabled = true;
      btn.textContent = 'Đang xoá...';
      await deleteCallback();
      btn.disabled = false;
      btn.textContent = 'Xoá';
    }
    document.getElementById('deleteOverlay').style.display = 'none';
    deleteCallback = null;
  });
}

function confirmDeleteProject(projectId, name) {
  document.getElementById('deleteConfirmText').innerHTML =
    `Bạn có chắc muốn xoá project <strong>${escapeHtml(name)}</strong> và tất cả bản ghi âm trong đó?`;
  document.getElementById('deleteOverlay').style.display = 'flex';
  deleteCallback = async () => {
    try {
      await api.delete(`/api/projects/${projectId}`);
      showToast('Đã xoá project!');
      if (currentProjectId === projectId) showWelcome();
      await loadProjects();
    } catch (err) {
      showToast(err.message, 'error');
    }
  };
}

function confirmDeleteRecording(recordingId, name) {
  document.getElementById('deleteConfirmText').innerHTML =
    `Bạn có chắc muốn xoá bản ghi âm <strong>${escapeHtml(name)}</strong>?`;
  document.getElementById('deleteOverlay').style.display = 'flex';
  deleteCallback = async () => {
    try {
      await api.delete(`/api/recordings/${recordingId}`);
      showToast('Đã xoá bản ghi!');
      await loadRecordings(currentProjectId);
      await loadProjects(); // update count
    } catch (err) {
      showToast(err.message, 'error');
    }
  };
}

// ============================================================
// RECORDINGS
// ============================================================
async function loadRecordings(projectId) {
  const list = document.getElementById('recordingsList');
  const empty = document.getElementById('recordingsEmpty');
  const countEl = document.getElementById('recordingCount');

  list.innerHTML = `<div style="display:flex;justify-content:center;padding:24px"><div class="spinner"></div></div>`;

  try {
    const recordings = await api.get('/api/recordings', { project_id: projectId });
    countEl.textContent = recordings.length;

    if (!recordings.length) {
      list.innerHTML = '';
      list.appendChild(empty);
      empty.style.display = 'flex';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = recordings.map(r => `
      <div class="recording-card" id="rec-${r.id}">
        <div class="recording-card__header">
          <div class="recording-card__name">🎙 ${escapeHtml(r.name)}</div>
          <div class="recording-card__meta">
            <span class="recording-card__time">${formatDate(r.created_at)}</span>
            <button class="recording-card__del" onclick="confirmDeleteRecording(${r.id}, '${escapeHtml(r.name)}')" title="Xoá">✕</button>
          </div>
        </div>
        <audio controls src="${escapeHtml(r.audio_url)}" preload="none"></audio>
        <div class="recording-card__info">
          <span>⏱ ${formatDuration(r.duration_seconds)}</span>
          <span>📦 ${formatBytes(r.file_size_bytes)}</span>
        </div>
      </div>
    `).join('');
  } catch (err) {
    list.innerHTML = `<div style="color:var(--red);font-size:13px;padding:16px">Lỗi: ${escapeHtml(err.message)}</div>`;
  }
}

// ============================================================
// RECORDER
// ============================================================
function setupRecorder() {
  document.getElementById('btnRecord').addEventListener('click', startRecording);
  document.getElementById('btnStop').addEventListener('click', stopRecording);
  document.getElementById('btnSaveRecording').addEventListener('click', saveRecording);
  document.getElementById('btnDiscardRecording').addEventListener('click', resetRecorder);
}

function resetRecorder() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  if (timerInterval) clearInterval(timerInterval);

  mediaRecorder = null;
  audioChunks = [];
  recordingBlob = null;
  recordingDuration = 0;

  const widget = document.getElementById('recorderWidget');
  widget.classList.remove('recording');

  document.getElementById('recorderDot').className = 'recorder__dot';
  document.getElementById('recorderStatusText').textContent = 'Sẵn sàng';
  document.getElementById('recorderTimer').textContent = '00:00';
  document.getElementById('btnRecord').disabled = false;
  document.getElementById('btnStop').disabled = true;

  document.getElementById('recorderPreview').style.display = 'none';
  document.getElementById('previewAudio').src = '';
  document.getElementById('recordingNameInput').value = '';
}

async function startRecording() {
  if (!currentProjectId) {
    showToast('Vui lòng chọn một project trước.', 'error');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    const options = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? { mimeType: 'audio/webm;codecs=opus' }
      : MediaRecorder.isTypeSupported('audio/webm')
      ? { mimeType: 'audio/webm' }
      : {};

    mediaRecorder = new MediaRecorder(stream, options);

    mediaRecorder.addEventListener('dataavailable', (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    });

    mediaRecorder.addEventListener('stop', () => {
      stream.getTracks().forEach(t => t.stop());
      const mimeType = mediaRecorder.mimeType || 'audio/webm';
      recordingBlob = new Blob(audioChunks, { type: mimeType });

      const url = URL.createObjectURL(recordingBlob);
      document.getElementById('previewAudio').src = url;

      const now = new Date();
      const defaultName = `Ghi âm ${now.toLocaleDateString('vi-VN')} ${now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })}`;
      document.getElementById('recordingNameInput').value = defaultName;
      document.getElementById('recorderPreview').style.display = 'flex';
    });

    mediaRecorder.start(100);
    timerStart = Date.now();
    timerInterval = setInterval(updateTimer, 500);

    document.getElementById('recorderWidget').classList.add('recording');
    document.getElementById('recorderDot').className = 'recorder__dot recording';
    document.getElementById('recorderStatusText').textContent = 'Đang ghi âm...';
    document.getElementById('btnRecord').disabled = true;
    document.getElementById('btnStop').disabled = false;
    document.getElementById('recorderPreview').style.display = 'none';

  } catch (err) {
    showToast('Không thể truy cập microphone: ' + err.message, 'error');
  }
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - timerStart) / 1000);
  recordingDuration = elapsed;
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('recorderTimer').textContent =
    `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  if (timerInterval) clearInterval(timerInterval);

  document.getElementById('recorderWidget').classList.remove('recording');
  document.getElementById('recorderDot').className = 'recorder__dot';
  document.getElementById('recorderStatusText').textContent = 'Hoàn thành';
  document.getElementById('btnRecord').disabled = false;
  document.getElementById('btnStop').disabled = true;
}

async function saveRecording() {
  if (!recordingBlob) return;

  const name = document.getElementById('recordingNameInput').value.trim();
  if (!name) {
    showToast('Vui lòng đặt tên cho bản ghi âm.', 'error');
    document.getElementById('recordingNameInput').focus();
    return;
  }

  const btn = document.getElementById('btnSaveRecording');
  const btnText = document.getElementById('btnSaveText');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px"></span> Đang lưu...';

  try {
    // Get extension from mime type
    const mime = recordingBlob.type || 'audio/webm';
    const ext = mime.includes('ogg') ? 'ogg' : mime.includes('mp4') ? 'mp4' : 'webm';
    const filename = `${name.replace(/[^a-zA-Z0-9_-]/g, '_')}.${ext}`;

    // Get presigned URL from S3
    const { upload_url, file_url } = await api.post('/api/upload/presigned-url', { filename });

    // Upload raw blob to S3
    const uploadRes = await fetch(upload_url, {
      method: 'PUT',
      body: recordingBlob,
      headers: { 'Content-Type': mime },
    });

    if (!uploadRes.ok) throw new Error(`Upload S3 thất bại: ${uploadRes.status}`);

    // Save metadata to DB
    await api.post('/api/recordings', {
      project_id: currentProjectId,
      name,
      audio_url: file_url,
      duration_seconds: recordingDuration,
      file_size_bytes: recordingBlob.size,
    });

    showToast('Đã lưu bản ghi âm!');
    resetRecorder();
    await loadRecordings(currentProjectId);
    await loadProjects(); // update count in sidebar

  } catch (err) {
    showToast('Lỗi khi lưu: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'Lưu bản ghi';
  }
}

</script>
