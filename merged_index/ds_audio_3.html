<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AudioText Studio</title>
  <meta name="description" content="Quản lý và phát các cặp văn bản và âm thanh theo từng dự án." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
/* ============================================
   AudioText Studio — Dark Editorial Aesthetic
   Fonts: Playfair Display + JetBrains Mono + Crimson Pro
   ============================================ */

/* Reset */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ============================================
   CSS VARIABLES
   ============================================ */
:root {
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Crimson Pro', Georgia, serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;

  /* Dark editorial palette */
  --color-bg: #0e0e0f;
  --color-surface: #161618;
  --color-surface-2: #1e1e21;
  --color-surface-3: #252529;
  --color-border: #2a2a2e;
  --color-border-light: #38383e;
  --color-text: #e8e4dc;
  --color-text-muted: #7a7870;
  --color-text-dim: #4a4a50;
  --color-accent: #c8a96e;       /* warm amber/gold */
  --color-accent-dim: #8a7048;
  --color-accent-glow: rgba(200, 169, 110, 0.12);
  --color-success: #5a9a6e;
  --color-error: #c25c5c;
  --color-error-bg: rgba(194, 92, 92, 0.08);
  --color-playing: #6ea8c8;      /* cool blue for playing state */

  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --space-2xl: 36px;
  --space-3xl: 56px;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 14px;
  --radius-full: 999px;

  --transition-fast: 140ms ease;
  --transition-normal: 240ms ease;
  --transition-slow: 400ms ease-out;
}

/* ============================================
   BASE
   ============================================ */
html, body {
  height: 100%;
  font-family: var(--font-body);
  font-size: 17px;
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  /* Subtle noise texture overlay */
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(200, 169, 110, 0.05) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
}

/* ============================================
   HEADER
   ============================================ */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(14, 14, 15, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--color-border);
}

.header-inner {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 var(--space-xl);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  cursor: pointer;
  user-select: none;
  transition: opacity var(--transition-fast);
}

.logo:hover { opacity: 0.75; }

.logo-mark {
  color: var(--color-accent);
  font-size: 18px;
  line-height: 1;
}

.logo-text {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--color-text);
  letter-spacing: 0.01em;
}

.logo-text em {
  font-style: italic;
  color: var(--color-accent);
}

/* Breadcrumb */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--color-text-muted);
}

.breadcrumb-sep {
  color: var(--color-text-dim);
}

.breadcrumb-item {
  cursor: pointer;
  transition: color var(--transition-fast);
}

.breadcrumb-item:hover { color: var(--color-accent); }
.breadcrumb-item.active { color: var(--color-accent); cursor: default; }

/* ============================================
   MAIN
   ============================================ */
.site-main {
  flex: 1;
  max-width: 1300px;
  margin: 0 auto;
  width: 100%;
  padding: var(--space-2xl) var(--space-xl);
}

/* ============================================
   VIEWS
   ============================================ */
.view { display: none; }
.view.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.view-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-xl);
  margin-bottom: var(--space-2xl);
  padding-bottom: var(--space-xl);
  border-bottom: 1px solid var(--color-border);
}

.view-title {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.1;
  letter-spacing: -0.01em;
}

.view-subtitle {
  margin-top: var(--space-xs);
  font-size: 15px;
  color: var(--color-text-muted);
  font-family: var(--font-mono);
}

/* ============================================
   BUTTONS
   ============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-sm) var(--space-lg);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
  text-decoration: none;
  line-height: 1.4;
}

.btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.btn-primary {
  background: var(--color-accent);
  color: #0e0e0f;
  font-weight: 600;
}

.btn-primary:hover:not(:disabled) {
  background: #d4b87a;
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border-light);
}

.btn-ghost:hover:not(:disabled) {
  color: var(--color-text);
  border-color: var(--color-text-dim);
}

.btn-danger {
  background: var(--color-error);
  color: #fff;
}

.btn-danger:hover:not(:disabled) {
  background: #d06060;
}

.btn-icon {
  font-size: 16px;
  line-height: 1;
  font-weight: 400;
}

/* ============================================
   CARDS
   ============================================ */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-xl);
  transition: border-color var(--transition-normal);
}

.card-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: var(--space-lg);
}

.form-card {
  margin-bottom: var(--space-2xl);
  border-color: var(--color-border-light);
  background: var(--color-surface-2);
}

/* ============================================
   PROJECTS GRID
   ============================================ */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-lg);
}

.project-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-xl);
  cursor: pointer;
  transition: all var(--transition-normal);
  position: relative;
  overflow: hidden;
}

.project-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
  opacity: 0;
  transition: opacity var(--transition-normal);
}

.project-card:hover {
  border-color: var(--color-accent-dim);
  background: var(--color-surface-2);
  transform: translateY(-2px);
}

.project-card:hover::before {
  opacity: 1;
}

.project-card__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}

.project-card__name {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--color-text);
  line-height: 1.2;
  flex: 1;
}

.project-card__delete {
  background: none;
  border: none;
  color: var(--color-text-dim);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
  flex-shrink: 0;
}

.project-card__delete:hover {
  color: var(--color-error);
  background: var(--color-error-bg);
}

.project-card__desc {
  font-size: 14px;
  color: var(--color-text-muted);
  line-height: 1.5;
  margin-bottom: var(--space-lg);
  min-height: 42px;
}

.project-card__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: var(--space-md);
  border-top: 1px solid var(--color-border);
}

.project-card__count {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--color-accent);
}

.project-card__date {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-dim);
}

/* ============================================
   FORMS
   ============================================ */
.form-group {
  margin-bottom: var(--space-lg);
}

.form-label {
  display: block;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-muted);
  margin-bottom: var(--space-xs);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.required {
  color: var(--color-accent);
}

.form-input {
  width: 100%;
  background: var(--color-surface-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: var(--space-md) var(--space-lg);
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--color-text);
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  outline: none;
}

.form-input::placeholder {
  color: var(--color-text-dim);
}

.form-input:focus {
  border-color: var(--color-accent-dim);
  box-shadow: 0 0 0 3px var(--color-accent-glow);
}

.form-textarea {
  resize: vertical;
  min-height: 80px;
  font-family: var(--font-body);
  line-height: 1.6;
}

.form-textarea.mono {
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  min-height: 130px;
}

.form-error {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-error);
  margin-top: var(--space-xs);
  min-height: 16px;
}

.form-input.has-error {
  border-color: var(--color-error);
}

.form-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: var(--space-sm);
  margin-top: var(--space-xl);
  padding-top: var(--space-lg);
  border-top: 1px solid var(--color-border);
}

/* ============================================
   FILE DROP ZONE
   ============================================ */
.file-drop-zone {
  position: relative;
  border: 1px dashed var(--color-border-light);
  border-radius: var(--radius-md);
  padding: var(--space-xl) var(--space-lg);
  text-align: center;
  transition: all var(--transition-normal);
  cursor: pointer;
  background: var(--color-surface-3);
}

.file-drop-zone:hover,
.file-drop-zone.drag-over {
  border-color: var(--color-accent-dim);
  background: var(--color-accent-glow);
}

.file-input-hidden {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.file-drop-icon {
  display: block;
  font-size: 28px;
  color: var(--color-accent);
  margin-bottom: var(--space-sm);
  line-height: 1;
}

.file-drop-text {
  font-size: 14px;
  color: var(--color-text-muted);
}

.file-browse-link {
  color: var(--color-accent);
  cursor: pointer;
  text-decoration: underline;
  text-decoration-style: dotted;
}

.file-drop-hint {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-dim);
  margin-top: var(--space-xs);
}

.file-selected {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  justify-content: center;
  padding: var(--space-sm) 0;
}

.file-selected-icon {
  color: var(--color-success);
  font-size: 16px;
}

.file-selected-name {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--color-text);
  word-break: break-all;
}

.file-change-link {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-accent-dim);
  cursor: pointer;
  text-decoration: underline;
  text-decoration-style: dotted;
  flex-shrink: 0;
}

/* ============================================
   DETAIL LAYOUT (entries + player)
   ============================================ */
.detail-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: var(--space-xl);
  align-items: start;
}

@media (max-width: 900px) {
  .detail-layout {
    grid-template-columns: 1fr;
  }
}

/* ============================================
   ENTRIES LIST
   ============================================ */
.entries-panel {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.entry-item {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-lg);
  cursor: pointer;
  transition: all var(--transition-normal);
  display: flex;
  align-items: center;
  gap: var(--space-md);
  position: relative;
}

.entry-item:hover {
  border-color: var(--color-border-light);
  background: var(--color-surface-2);
}

.entry-item.playing {
  border-color: var(--color-playing);
  background: rgba(110, 168, 200, 0.06);
}

.entry-item.playing .entry-item__title {
  color: var(--color-playing);
}

.entry-item__play-icon {
  flex-shrink: 0;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--color-surface-3);
  border: 1px solid var(--color-border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--color-text-muted);
  transition: all var(--transition-fast);
}

.entry-item:hover .entry-item__play-icon {
  background: var(--color-accent-glow);
  border-color: var(--color-accent-dim);
  color: var(--color-accent);
}

.entry-item.playing .entry-item__play-icon {
  background: rgba(110, 168, 200, 0.15);
  border-color: var(--color-playing);
  color: var(--color-playing);
}

.entry-item__info {
  flex: 1;
  min-width: 0;
}

.entry-item__title {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.entry-item__preview {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.entry-item__delete {
  background: none;
  border: none;
  color: var(--color-text-dim);
  cursor: pointer;
  font-size: 13px;
  padding: 4px 6px;
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
  flex-shrink: 0;
  opacity: 0;
}

.entry-item:hover .entry-item__delete {
  opacity: 1;
}

.entry-item__delete:hover {
  color: var(--color-error);
  background: var(--color-error-bg);
}

/* ============================================
   PLAYER PANEL
   ============================================ */
.player-panel {
  position: sticky;
  top: 80px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.player-empty {
  padding: var(--space-3xl) var(--space-xl);
  text-align: center;
  color: var(--color-text-dim);
}

.player-empty-icon {
  display: block;
  font-size: 32px;
  color: var(--color-accent);
  opacity: 0.3;
  margin-bottom: var(--space-md);
}

.player-empty p {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--color-text-dim);
}

.player-active {
  display: flex;
  flex-direction: column;
}

.player-meta {
  padding: var(--space-lg) var(--space-xl);
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-sm);
  background: var(--color-surface-2);
}

.player-title {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--color-text);
  line-height: 1.2;
  flex: 1;
}

.player-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--color-playing);
  background: rgba(110, 168, 200, 0.1);
  border: 1px solid rgba(110, 168, 200, 0.25);
  padding: 3px 8px;
  border-radius: var(--radius-full);
  flex-shrink: 0;
  white-space: nowrap;
}

.player-text-box {
  padding: var(--space-xl);
  max-height: 300px;
  overflow-y: auto;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.8;
  color: var(--color-text-muted);
  white-space: pre-wrap;
  word-break: break-word;
  border-bottom: 1px solid var(--color-border);
}

.player-text-box::-webkit-scrollbar {
  width: 4px;
}

.player-text-box::-webkit-scrollbar-track {
  background: transparent;
}

.player-text-box::-webkit-scrollbar-thumb {
  background: var(--color-border-light);
  border-radius: 2px;
}

/* ============================================
   AUDIO CONTROLS
   ============================================ */
.audio-player-wrap {
  padding: var(--space-lg) var(--space-xl);
}

.audio-controls {
  display: flex;
  align-items: center;
  gap: var(--space-md);
}

.audio-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--color-accent);
  border: none;
  color: #0e0e0f;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition-fast);
}

.audio-btn:hover {
  background: #d4b87a;
  transform: scale(1.08);
}

.audio-progress-wrap {
  flex: 1;
}

.audio-progress-bar {
  position: relative;
  height: 4px;
  background: var(--color-surface-3);
  border-radius: 2px;
  cursor: pointer;
}

.audio-progress-fill {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: var(--color-accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.1s linear;
  pointer-events: none;
}

.audio-progress-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 12px;
  height: 12px;
  background: var(--color-accent);
  border-radius: 50%;
  left: 0%;
  pointer-events: none;
  transition: left 0.1s linear;
}

.audio-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-dim);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ============================================
   MODAL
   ============================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-xl);
  animation: overlayIn 0.2s ease;
}

@keyframes overlayIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal {
  background: var(--color-surface-2);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-lg);
  padding: var(--space-2xl);
  max-width: 400px;
  width: 100%;
  animation: modalIn 0.2s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: var(--space-sm);
}

.modal-body {
  font-size: 15px;
  color: var(--color-text-muted);
  margin-bottom: var(--space-xl);
  line-height: 1.5;
}

.modal-actions {
  display: flex;

  <script>
/**
 * API Helper Module
 * Handles all communication with the backend
 *
 * Usage in app.js:
 *   api.get('/api/health')
 *   api.post('/api/items', { name: 'Item 1' })
 *   api.put('/api/items/1', { name: 'Updated' })
 *   api.delete('/api/items/1')
 *   api.uploadForm('/api/upload', formData)
 *
 * Upload file:
 *   const formData = new FormData();
 *   formData.append('file', fileInput.files[0]);
 *   const { file_url } = await api.uploadForm('/api/upload', formData);
 */

const API_URL = 'https://d2zreyywlhdhjob2dj7vztvqrq0agdwl.lambda-url.ap-southeast-1.on.aws';

/**
 * Process response: check status and parse JSON
 */
async function processResponse(response) {
  const data = await response.json();

  if (!response.ok) {
    throw new Error(
      data?.detail || data?.error || `HTTP ${response.status}`
    );
  }

  if (data && data.error) {
    throw new Error(data.error);
  }

  return data;
}

const api = {
  /**
   * Make a GET request
   * @param {string} path - API path (e.g., '/api/health')
   * @param {object} params - Query parameters
   * @returns {Promise<any>} Response data
   */
  async get(path, params = {}) {
    const url = new URL(`${API_URL}${path}`);
    Object.entries(params).forEach(([key, value]) => {
      if (value !== undefined && value !== null) {
        url.searchParams.append(key, value);
      }
    });

    const response = await fetch(url.toString());
    return processResponse(response);
  },

  /**
   * Make a POST request
   * @param {string} path - API path (e.g., '/api/items')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async post(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a PUT request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async put(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a DELETE request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Optional request body
   * @returns {Promise<any>} Response data
   */
  async delete(path, body = null) {
    const options = { method: 'DELETE' };
    if (body) {
      options.headers = { 'Content-Type': 'application/json' };
      options.body = JSON.stringify(body);
    }

    const response = await fetch(`${API_URL}${path}`, options);
    return processResponse(response);
  },

  /**
   * Upload files with FormData
   * @param {string} path - API path (e.g., '/api/upload')
   * @param {FormData} formData - FormData object with files and fields
   * @returns {Promise<any>} Response data
   */
  async uploadForm(path, formData) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      body: formData,
    });
    return processResponse(response);
  },
};

// Export for use in other modules
window.api = api;

</script>
  <script>
/**
 * AudioText Studio — Main Application
 */

// ─── State ───────────────────────────────────────────────────────────────────
let currentProjectId = null;
let currentEntryId = null;
let confirmCallback = null;
let isDragging = false;
let selectedAudioFile = null;

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const viewProjects = document.getElementById('view-projects');
const viewDetail   = document.getElementById('view-detail');

const projectsContainer = document.getElementById('projects-container');
const entriesContainer  = document.getElementById('entries-container');

const btnNewProject   = document.getElementById('btn-new-project');
const btnCancelProject = document.getElementById('btn-cancel-project');
const newProjectFormCard = document.getElementById('new-project-form-card');
const newProjectForm  = document.getElementById('new-project-form');

const btnNewEntry    = document.getElementById('btn-new-entry');
const btnCancelEntry = document.getElementById('btn-cancel-entry');
const newEntryFormCard = document.getElementById('new-entry-form-card');
const newEntryForm   = document.getElementById('new-entry-form');

const detailProjectName = document.getElementById('detail-project-name');
const detailProjectDesc = document.getElementById('detail-project-desc');

// Breadcrumb
const bcHome    = document.getElementById('bc-home');
const bcSep     = document.getElementById('bc-sep');
const bcProject = document.getElementById('bc-project');

// Player
const playerEmpty  = document.getElementById('player-empty');
const playerActive = document.getElementById('player-active');
const playerTitle  = document.getElementById('player-title');
const playerText   = document.getElementById('player-text');
const audioEl      = document.getElementById('audio-el');
const audioPlayBtn = document.getElementById('audio-play-btn');
const audioProgressBar   = document.getElementById('audio-progress-bar');
const audioProgressFill  = document.getElementById('audio-progress-fill');
const audioProgressThumb = document.getElementById('audio-progress-thumb');
const audioTime    = document.getElementById('audio-time');

// Modal
const confirmModal  = document.getElementById('confirm-modal');
const modalTitle    = document.getElementById('modal-title');
const modalBody     = document.getElementById('modal-body');
const modalCancel   = document.getElementById('modal-cancel');
const modalConfirm  = document.getElementById('modal-confirm');

// File upload
const audioDropZone     = document.getElementById('audio-drop-zone');
const entryAudioInput   = document.getElementById('entry-audio');
const fileDropContent   = document.getElementById('file-drop-content');
const fileSelectedInfo  = document.getElementById('file-selected-info');
const fileSelectedName  = document.getElementById('file-selected-name');

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  init();
});

async function init() {
  setupEventListeners();
  showView('projects');
  await loadProjects();
}

// ─── View management ─────────────────────────────────────────────────────────
function showView(view) {
  viewProjects.classList.remove('active');
  viewProjects.classList.add('hidden');
  viewDetail.classList.remove('active');
  viewDetail.classList.add('hidden');

  if (view === 'projects') {
    viewProjects.classList.remove('hidden');
    viewProjects.classList.add('active');
    bcSep.classList.add('hidden');
    bcProject.classList.add('hidden');
    bcHome.classList.add('active');
    currentProjectId = null;
    stopAudio();
  } else if (view === 'detail') {
    viewDetail.classList.remove('hidden');
    viewDetail.classList.add('active');
    bcSep.classList.remove('hidden');
    bcProject.classList.remove('hidden');
    bcHome.classList.remove('active');
  }
}

// ─── Event Listeners ─────────────────────────────────────────────────────────
function setupEventListeners() {
  // Logo / breadcrumb back
  document.getElementById('logo-link').addEventListener('click', goHome);
  document.getElementById('logo-link').addEventListener('keydown', e => { if (e.key === 'Enter') goHome(); });
  bcHome.addEventListener('click', goHome);

  // Project form toggle
  btnNewProject.addEventListener('click', () => {
    newProjectFormCard.classList.remove('hidden');
    btnNewProject.classList.add('hidden');
    document.getElementById('project-name').focus();
  });

  btnCancelProject.addEventListener('click', () => {
    newProjectFormCard.classList.add('hidden');
    btnNewProject.classList.remove('hidden');
    newProjectForm.reset();
    clearFieldError('project-name');
  });

  newProjectForm.addEventListener('submit', handleCreateProject);

  // Entry form toggle
  btnNewEntry.addEventListener('click', () => {
    newEntryFormCard.classList.remove('hidden');
    btnNewEntry.classList.add('hidden');
    document.getElementById('entry-title').focus();
  });

  btnCancelEntry.addEventListener('click', cancelEntryForm);

  newEntryForm.addEventListener('submit', handleCreateEntry);

  // File input
  entryAudioInput.addEventListener('change', handleFileSelect);

  // Drag and drop on file zone
  audioDropZone.addEventListener('dragover', e => {
    e.preventDefault();
    audioDropZone.classList.add('drag-over');
  });
  audioDropZone.addEventListener('dragleave', () => {
    audioDropZone.classList.remove('drag-over');
  });
  audioDropZone.addEventListener('drop', e => {
    e.preventDefault();
    audioDropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('audio/')) {
      setSelectedAudioFile(file);
    }
  });

  // Audio player controls
  audioPlayBtn.addEventListener('click', togglePlay);

  audioProgressBar.addEventListener('click', e => {
    if (!audioEl.duration) return;
    const rect = audioProgressBar.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audioEl.currentTime = ratio * audioEl.duration;
  });

  audioEl.addEventListener('timeupdate', updateProgress);
  audioEl.addEventListener('ended', () => {
    audioPlayBtn.textContent = '▶';
  });
  audioEl.addEventListener('loadedmetadata', updateProgress);

  // Modal
  modalCancel.addEventListener('click', closeModal);
  modalConfirm.addEventListener('click', () => {
    if (confirmCallback) confirmCallback();
    closeModal();
  });
  confirmModal.addEventListener('click', e => {
    if (e.target === confirmModal) closeModal();
  });

  // Keyboard escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (!confirmModal.classList.contains('hidden')) closeModal();
    }
  });
}

function goHome() {
  showView('projects');
  newEntryFormCard.classList.add('hidden');
  btnNewEntry.classList.remove('hidden');
  loadProjects();
}

function cancelEntryForm() {
  newEntryFormCard.classList.add('hidden');
  btnNewEntry.classList.remove('hidden');
  newEntryForm.reset();
  resetFileZone();
  clearFieldError('entry-title');
  clearFieldError('entry-text');
  clearFieldError('entry-audio');
}

// ─── Projects ─────────────────────────────────────────────────────────────────
async function loadProjects() {
  showLoading(projectsContainer);
  try {
    const projects = await api.get('/api/projects');
    if (projects.length === 0) {
      showEmpty(projectsContainer, 'Chưa có project nào. Tạo project đầu tiên của bạn!');
    } else {
      renderProjects(projects);
    }
  } catch (err) {
    showError(projectsContainer, err.message);
  }
}

function renderProjects(projects) {
  projectsContainer.innerHTML = projects.map(p => `
    <div class="project-card" data-id="${p.id}" role="button" tabindex="0">
      <div class="project-card__header">
        <h2 class="project-card__name">${escapeHtml(p.name)}</h2>
        <button class="project-card__delete" data-delete-project="${p.id}" title="Xoá project" onclick="event.stopPropagation()">✕</button>
      </div>
      <p class="project-card__desc">${p.description ? escapeHtml(p.description) : '<em style="opacity:0.4">Không có mô tả</em>'}</p>
      <div class="project-card__footer">
        <span class="project-card__count">${p.entry_count} entries</span>
        <span class="project-card__date">${formatDate(p.created_at)}</span>
      </div>
    </div>
  `).join('');

  // Open project on card click
  projectsContainer.querySelectorAll('.project-card').forEach(card => {
    card.addEventListener('click', () => openProject(+card.dataset.id));
    card.addEventListener('keydown', e => { if (e.key === 'Enter') openProject(+card.dataset.id); });
  });

  // Delete buttons
  projectsContainer.querySelectorAll('[data-delete-project]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = +btn.dataset.deleteProject;
      showConfirm('Xoá Project', 'Toàn bộ entries trong project này cũng sẽ bị xoá. Tiếp tục?', async () => {
        await deleteProject(id);
      });
    });
  });
}

async function handleCreateProject(e) {
  e.preventDefault();
  const name = document.getElementById('project-name').value.trim();
  if (!name) {
    showFieldError('project-name', 'Tên project không được trống');
    return;
  }
  clearFieldError('project-name');

  const btn = document.getElementById('btn-submit-project');
  btn.disabled = true;
  btn.textContent = 'Đang tạo…';

  try {
    await api.post('/api/projects', {
      name,
      description: document.getElementById('project-desc').value.trim() || null,
    });
    newProjectFormCard.classList.add('hidden');
    btnNewProject.classList.remove('hidden');
    newProjectForm.reset();
    await loadProjects();
  } catch (err) {
    showFieldError('project-name', err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Tạo Project';
  }
}

async function deleteProject(id) {
  try {
    await api.delete(`/api/projects/${id}`);
    await loadProjects();
  } catch (err) {
    alert('Xoá thất bại: ' + err.message);
  }
}

// ─── Project detail ───────────────────────────────────────────────────────────
async function openProject(id) {
  currentProjectId = id;
  stopAudio();

  // Reset player
  playerEmpty.classList.remove('hidden');
  playerActive.classList.add('hidden');
  currentEntryId = null;

  showView('detail');

  // Load project info
  try {
    const project = await api.get(`/api/projects/${id}`);
    detailProjectName.textContent = project.name;
    detailProjectDesc.textContent = project.description || '';
    bcProject.textContent = project.name;
  } catch (err) {
    detailProjectName.textContent = 'Project';
  }

  await loadEntries(id);
}

async function loadEntries(projectId) {
  showLoading(entriesContainer);
  try {
    const entries = await api.get(`/api/projects/${projectId}/entries`);
    if (entries.length === 0) {
      showEmpty(entriesContainer, 'Chưa có entries. Thêm cặp text/audio đầu tiên!');
    } else {
      renderEntries(entries);
    }
  } catch (err) {
    showError(entriesContainer, err.message);
  }
}

function renderEntries(entries) {
  entriesContainer.innerHTML = entries.map(entry => `
    <div class="entry-item ${entry.id === currentEntryId ? 'playing' : ''}"
         data-id="${entry.id}" role="button" tabindex="0">
      <div class="entry-item__play-icon">${entry.id === currentEntryId ? '▶' : '♪'}</div>
      <div class="entry-item__info">
        <div class="entry-item__title">${escapeHtml(entry.title)}</div>
        <div class="entry-item__preview">${escapeHtml(entry.text_content.slice(0, 80))}${entry.text_content.length > 80 ? '…' : ''}</div>
      </div>
      <button class="entry-item__delete" data-delete-entry="${entry.id}" title="Xoá entry">✕</button>
    </div>
  `).join('');

  entriesContainer.querySelectorAll('.entry-item').forEach(item => {
    item.addEventListener('click', () => playEntry(+item.dataset.id, entries));
    item.addEventListener('keydown', e => { if (e.key === 'Enter') playEntry(+item.dataset.id, entries); });
  });

  entriesContainer.querySelectorAll('[data-delete-entry]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = +btn.dataset.deleteEntry;
      showConfirm('Xoá Entry', 'Entry này sẽ bị xoá vĩnh viễn.', async () => {
        await deleteEntry(id);
      });
    });
  });
}

async function handleCreateEntry(e) {
  e.preventDefault();

  const title = document.getElementById('entry-title').value.trim();
  const text  = document.getElementById('entry-text').value.trim();

  let hasError = false;
  if (!title) { showFieldError('entry-title', 'Tiêu đề không được trống'); hasError = true; }
  else clearFieldError('entry-title');
  if (!text)  { showFieldError('entry-text', 'Nội dung văn bản không được trống'); hasError = true; }
  else clearFieldError('entry-text');
  if (!selectedAudioFile) { showFieldError('entry-audio', 'Vui lòng chọn file âm thanh'); hasError = true; }
  else clearFieldError('entry-audio');

  if (hasError) return;

  const btn = document.getElementById('btn-submit-entry');
  const labelEl = document.getElementById('submit-entry-label');
  btn.disabled = true;
  labelEl.innerHTML = '<span class="btn-spinner"></span> Đang upload…';

  try {
    // 1. Upload audio file
    const formData = new FormData();
    formData.append('file', selectedAudioFile);
    const uploadResult = await api.uploadForm('/api/upload', formData);

    // 2. Create entry with audio_url
    await api.post(`/api/projects/${currentProjectId}/entries`, {
      title,
      text_content: text,
      audio_url: uploadResult.file_url,
      audio_filename: uploadResult.filename,
    });

    cancelEntryForm();
    await loadEntries(currentProjectId);
  } catch (err) {
    showFieldError('entry-audio', err.message);
  } finally {
    btn.disabled = false;
    labelEl.textContent = 'Lưu Entry';
  }
}

async function deleteEntry(id) {
  try {
    await api.delete(`/api/projects/${currentProjectId}/entries/${id}`);
    if (currentEntryId === id) {
      stopAudio();
      playerEmpty.classList.remove('hidden');
      playerActive.classList.add('hidden');
      currentEntryId = null;
    }
    await loadEntries(currentProjectId);
  } catch (err) {
    alert('Xoá thất bại: ' + err.message);
  }
}

// ─── Audio player ─────────────────────────────────────────────────────────────
function playEntry(id, entries) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;

  currentEntryId = id;

  // Update active styling on list
  document.querySelectorAll('.entry-item').forEach(item => {
    const isCurrent = +item.dataset.id === id;
    item.classList.toggle('playing', isCurrent);
    item.querySelector('.entry-item__play-icon').textContent = isCurrent ? '▶' : '♪';
  });

  // Show player
  playerEmpty.classList.add('hidden');
  playerActive.classList.remove('hidden');

  playerTitle.textContent = entry.title;
  playerText.textContent = entry.text_content;

  // Load audio
  const audioUrl = `http://localhost:2701${entry.audio_url}`;
  if (audioEl.src !== audioUrl) {
    audioEl.src = audioUrl;
    audioEl.load();
  }
  audioEl.play().then(() => {
    audioPlayBtn.textContent = '⏸';
  }).catch(() => {
    audioPlayBtn.textContent = '▶';
  });
}

function togglePlay() {
  if (audioEl.paused) {
    audioEl.play().then(() => { audioPlayBtn.textContent = '⏸'; });
  } else {
    audioEl.pause();
    audioPlayBtn.textContent = '▶';
  }
}

function stopAudio() {
  audioEl.pause();
  audioEl.src = '';
  audioPlayBtn.textContent = '▶';
  audioProgressFill.style.width = '0%';
  audioProgressThumb.style.left = '0%';
  audioTime.textContent = '0:00 / 0:00';
}

function updateProgress() {
  const current = audioEl.currentTime || 0;
  const total   = audioEl.duration || 0;
  const pct = total ? (current / total) * 100 : 0;
  audioProgressFill.style.width = pct + '%';
  audioProgressThumb.style.left = pct + '%';
  audioTime.textContent = `${formatTime(current)} / ${formatTime(total)}`;
}

function formatTime(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ─── File upload zone ─────────────────────────────────────────────────────────
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) setSelectedAudioFile(file);
}

function setSelectedAudioFile(file) {
  selectedAudioFile = file;
  fileDropContent.classList.add('hidden');
  fileSelectedInfo.classList.remove('hidden');
  fileSelectedName.textContent = file.name;
  clearFieldError('entry-audio');
}

function resetFileZone() {
  selectedAudioFile = null;
  entryAudioInput.value = '';
  fileDropContent.classList.remove('hidden');
  fileSelectedInfo.classList.add('hidden');
  fileSelectedName.textContent = '';
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function showConfirm(title, body, onConfirm) {
  modalTitle.textContent = title;
  modalBody.textContent  = body;
  confirmCallback = onConfirm;
  confirmModal.classList.remove('hidden');
}

function closeModal() {
  confirmModal.classList.add('hidden');
  confirmCallback = null;
}

// ─── UI helpers ───────────────────────────────────────────────────────────────
function showLoading(container) {
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
}

function showError(container, message) {
  container.innerHTML = `<div class="error-message">Lỗi: ${escapeHtml(message)}</div>`;
}

function showEmpty(container, message = 'Không có dữ liệu') {
  container.innerHTML = `<div class="empty-state"><p>${escapeHtml(message)}</p></div>`;
}

function showFieldError(fieldId, message) {
  const el = document.getElementById(`${fieldId}-error`);
  if (el) el.textContent = message;
  const input = document.getElementById(fieldId) || document.querySelector(`[name="${fieldId}"]`);
  if (input) input.classList.add('has-error');
}

function clearFieldError(fieldId) {
  const el = document.getElementById(`${fieldId}-error`);
  if (el) el.textContent = '';
  const input = document.getElementById(fieldId) || document.querySelector(`[name="${fieldId}"]`);
  if (input) input.classList.remove('has-error');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

function formatDate(dateString) {
  const date = new Date(dateString);
  return date.toLocaleDateString('vi-VN', { year: 'numeric', month: 'short', day: 'numeric' });
}

</script>
