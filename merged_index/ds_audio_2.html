<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AudioVault — Text & Audio Archive</title>
  <meta name="description" content="Organize your text and audio pairs into projects. Upload, manage, and play back your audio archives." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
/* ===================================================
   AudioVault — Dark Audio Archive Theme
   Fonts: Abril Fatface (display) + DM Mono + Barlow
   Palette: Deep charcoal · Amber accent · Teal secondary
   =================================================== */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --font-display: 'Abril Fatface', serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'Barlow', sans-serif;

  --bg:         #0C0C0F;
  --surface:    #141418;
  --surface-2:  #1B1B21;
  --border:     #2A2A35;
  --border-2:   #353545;

  --accent:     #FF7B2C;
  --accent-dim: rgba(255, 123, 44, 0.15);
  --accent-glow:rgba(255, 123, 44, 0.35);
  --teal:       #00C9A7;
  --teal-dim:   rgba(0, 201, 167, 0.12);

  --text:       #EBEBF0;
  --text-muted: #7A7A90;
  --text-dim:   #4A4A60;

  --success:    #22c55e;
  --error:      #f04e4e;
  --warning:    #f59e0b;

  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  16px;
  --radius-xl:  24px;

  --shadow-card: 0 4px 24px rgba(0,0,0,0.45), 0 1px 4px rgba(0,0,0,0.3);
  --shadow-glow: 0 0 32px var(--accent-glow);

  --transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ===== BACKGROUND ===== */

.bg-grid {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
}

.bg-glow {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.18;
}
.bg-glow--1 {
  width: 600px; height: 600px;
  background: var(--accent);
  top: -200px; right: -150px;
}
.bg-glow--2 {
  width: 500px; height: 500px;
  background: var(--teal);
  bottom: -200px; left: -100px;
}

/* ===== HEADER ===== */

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(12, 12, 15, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.header__inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.header__logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.header__logo-mark {
  font-size: 22px;
  color: var(--accent);
  line-height: 1;
}
.header__logo-text {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--text);
  letter-spacing: 0.02em;
}

.header__nav {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
}

/* ===== MAIN ===== */

.main {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 32px 80px;
}

/* ===== VIEWS ===== */

.view {
  animation: fadeUp 0.4s ease both;
}
.view--hidden {
  display: none !important;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== PROJECTS VIEW HERO ===== */

.view__hero {
  margin-bottom: 40px;
}
.view__title {
  font-family: var(--font-display);
  font-size: clamp(32px, 5vw, 52px);
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 8px;
}
.view__subtitle {
  font-size: 15px;
  color: var(--text-muted);
  font-weight: 300;
}

/* ===== PROJECT GRID ===== */

.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  cursor: pointer;
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.project-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--teal));
  opacity: 0;
  transition: opacity var(--transition);
}
.project-card:hover {
  border-color: var(--border-2);
  transform: translateY(-3px);
  box-shadow: var(--shadow-card);
}
.project-card:hover::before {
  opacity: 1;
}

.project-card__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 12px;
}
.project-card__name {
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  flex: 1;
}
.project-card__menu {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity var(--transition);
}
.project-card:hover .project-card__menu {
  opacity: 1;
}
.project-card__desc {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 300;
  margin-bottom: 20px;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 40px;
}

.project-card__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.project-card__badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--teal);
  background: var(--teal-dim);
  padding: 4px 10px;
  border-radius: var(--radius-full);
  border: 1px solid rgba(0, 201, 167, 0.2);
}
.project-card__date {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

/* Empty state */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
}
.empty-state__icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}
.empty-state__title {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.empty-state__hint {
  font-size: 13px;
  color: var(--text-dim);
}

/* Loading state */
.loading-state {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px;
  gap: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 13px;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border-2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== DETAIL VIEW ===== */

.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 24px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.btn-back {
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 13px;
  cursor: pointer;
  padding: 8px 0;
  transition: color var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 4px;
}
.btn-back:hover { color: var(--accent); }

.detail-header__info {
  flex: 1;
  min-width: 200px;
}
.detail-header__name {
  font-family: var(--font-display);
  font-size: clamp(24px, 4vw, 40px);
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 6px;
}
.detail-header__desc {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 300;
}

.detail-header__actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

/* ===== PAIRS LIST ===== */

.pairs-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.pair-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  animation: fadeUp 0.3s ease both;
  transition: border-color var(--transition);
}
.pair-card:hover {
  border-color: var(--border-2);
}

.pair-card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  gap: 12px;
}
.pair-card__title {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.pair-card__date {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

.pair-card__body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
@media (max-width: 640px) {
  .pair-card__body { grid-template-columns: 1fr; }
}

.pair-card__text {
  padding: 16px 20px 20px;
  border-right: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}
@media (max-width: 640px) {
  .pair-card__text { border-right: none; border-bottom: 1px solid var(--border); }
}

.pair-card__audio {
  padding: 16px 20px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 10px;
}
.pair-card__audio audio {
  width: 100%;
  height: 36px;
  accent-color: var(--accent);
  filter: none;
}

.pair-card__footer {
  padding: 10px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
}

/* ===== BUTTONS ===== */

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
  text-decoration: none;
  user-select: none;
}
.btn--primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn--primary:hover {
  background: #ff9050;
  border-color: #ff9050;
  box-shadow: 0 0 20px var(--accent-glow);
}
.btn--ghost {
  background: transparent;
  color: var(--text-muted);
  border-color: var(--border);
}
.btn--ghost:hover {
  background: var(--surface-2);
  color: var(--text);
  border-color: var(--border-2);
}
.btn--danger {
  background: transparent;
  color: var(--error);
  border-color: rgba(240, 78, 78, 0.3);
}
.btn--danger:hover {
  background: rgba(240, 78, 78, 0.1);
  border-color: var(--error);
}
.btn--sm {
  padding: 5px 12px;
  font-size: 12px;
  border-radius: var(--radius-sm);
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ===== MODALS ===== */

.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}
.modal-overlay.active {
  opacity: 1;
  pointer-events: all;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  transform: translateY(20px) scale(0.97);
  transition: transform var(--transition);
}
.modal-overlay.active .modal {
  transform: translateY(0) scale(1);
}
.modal--wide { max-width: 640px; }

.modal__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 28px 0;
  gap: 16px;
}
.modal__title {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text);
}
.modal__close {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  line-height: 1;
  transition: color var(--transition);
  flex-shrink: 0;
}
.modal__close:hover { color: var(--text); }

.modal__body {
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.modal__footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding-top: 8px;
}

/* ===== FORMS ===== */

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.required { color: var(--accent); }
.optional { color: var(--text-dim); font-weight: 400; }

.form-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text);
  width: 100%;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.form-input::placeholder {
  color: var(--text-dim);
}
.form-textarea {
  resize: vertical;
  min-height: 80px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
}
.form-textarea--tall { min-height: 120px; }

.form-error {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--error);
}

/* ===== UPLOAD ZONE ===== */

.upload-zone {
  background: var(--bg);
  border: 1.5px dashed var(--border-2);
  border-radius: var(--radius-lg);
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.upload-zone:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.upload-zone__wave {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 4px;
  height: 32px;
  margin-bottom: 12px;
}
.upload-zone__wave span {
  display: block;
  width: 5px;
  border-radius: 3px;
  background: var(--accent);
  opacity: 0.5;
  animation: wave 1.2s ease-in-out infinite;
}
.upload-zone__wave span:nth-child(1) { height: 12px; animation-delay: 0s; }
.upload-zone__wave span:nth-child(2) { height: 24px; animation-delay: 0.1s; }
.upload-zone__wave span:nth-child(3) { height: 32px; animation-delay: 0.2s; }
.upload-zone__wave span:nth-child(4) { height: 20px; animation-delay: 0.3s; }
.upload-zone__wave span:nth-child(5) { height: 8px; animation-delay: 0.4s; }

@keyframes wave {
  0%, 100% { transform: scaleY(0.5); opacity: 0.4; }
  50%       { transform: scaleY(1);   opacity: 1; }
}

.upload-zone__text {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}
.upload-zone__hint {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

.upload-preview {
  margin-top: 10px;
  padding: 12px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--teal);
  display: flex;
  align-items: center;
  gap: 8px;
}
.upload-preview:empty { display: none; }

/* ===== TOAST ===== */

.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  z-index: 999;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-md);
  padding: 12px 20px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  transform: translateY(20px);
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  max-width: 360px;
}
.toast.toast--visible {
  transform: translateY(0);
  opacity: 1;
}
.toast.toast--success { border-left: 3px solid var(--success); }
.toast.toast--error   { border-left: 3px solid var(--error); }

/* ===== MISC ===== */

:root { --radius-full: 999px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Responsive */
@media (max-width: 768px) {
  .main { padding: 32px 16px 64px; }
  .header__inner { padding: 0 16px; }
  .detail-header { flex-direction: column; gap: 16px; }
  .detail-header__actions { width: 100%; justify-content: flex-end; }
}
@media (max-width: 480px) {
  .project-grid { grid-template-columns: 1fr; }
  .modal { border-radius: var(--radius-lg); }
}

</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <header class="header">
    <div class="header__inner">
      <a class="header__logo" href="#" onclick="showProjectsView(); return false;">
        <span class="header__logo-mark">◈</span>
        <span class="header__logo-text">AudioVault</span>
      </a>
      <nav class="header__nav" id="breadcrumb-nav"></nav>
      <button class="btn btn--primary" id="btn-new-project" onclick="openCreateProjectModal()">
        + New Project
      </button>
    </div>
  </header>

  <main class="main">

    <!-- PROJECTS VIEW -->
    <section class="view" id="view-projects">
      <div class="view__hero">
        <h1 class="view__title">Your Projects</h1>
        <p class="view__subtitle">Each project holds a collection of text &amp; audio pairs</p>
      </div>
      <div class="project-grid" id="project-grid"></div>
    </section>

    <!-- PROJECT DETAIL VIEW -->
    <section class="view view--hidden" id="view-detail">
      <div class="detail-header">
        <button class="btn-back" onclick="showProjectsView()">← Back</button>
        <div class="detail-header__info">
          <h1 class="detail-header__name" id="detail-project-name"></h1>
          <p class="detail-header__desc" id="detail-project-desc"></p>
        </div>
        <div class="detail-header__actions">
          <button class="btn btn--ghost" onclick="openEditProjectModal()">Edit</button>
          <button class="btn btn--danger" onclick="confirmDeleteProject()">Delete</button>
          <button class="btn btn--primary" onclick="openAddPairModal()">+ Add Pair</button>
        </div>
      </div>
      <div class="pairs-list" id="pairs-list"></div>
    </section>

  </main>

  <!-- MODAL: Create / Edit Project -->
  <div class="modal-overlay" id="modal-project" onclick="closeModal('modal-project')">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-project-title">New Project</h2>
        <button class="modal__close" onclick="closeModal('modal-project')">✕</button>
      </div>
      <form class="modal__body" id="form-project" onsubmit="submitProjectForm(event)">
        <div class="form-group">
          <label class="form-label" for="input-project-name">Project Name <span class="required">*</span></label>
          <input class="form-input" type="text" id="input-project-name" placeholder="e.g. English Pronunciation Pack" autocomplete="off" />
          <span class="form-error" id="err-project-name"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="input-project-desc">Description <span class="optional">(optional)</span></label>
          <textarea class="form-input form-textarea" id="input-project-desc" placeholder="What is this project about?" rows="3"></textarea>
        </div>
        <div class="modal__footer">
          <button type="button" class="btn btn--ghost" onclick="closeModal('modal-project')">Cancel</button>
          <button type="submit" class="btn btn--primary" id="btn-submit-project">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: Add Audio Pair -->
  <div class="modal-overlay" id="modal-pair" onclick="closeModal('modal-pair')">
    <div class="modal modal--wide" onclick="event.stopPropagation()">
      <div class="modal__header">
        <h2 class="modal__title">Add Text &amp; Audio Pair</h2>
        <button class="modal__close" onclick="closeModal('modal-pair')">✕</button>
      </div>
      <form class="modal__body" id="form-pair" onsubmit="submitPairForm(event)">
        <div class="form-group">
          <label class="form-label" for="input-pair-title">Title <span class="optional">(optional)</span></label>
          <input class="form-input" type="text" id="input-pair-title" placeholder="e.g. Lesson 01 — Greetings" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label" for="input-pair-text">Text Content <span class="required">*</span></label>
          <textarea class="form-input form-textarea form-textarea--tall" id="input-pair-text" placeholder="Enter the text that corresponds to this audio..." rows="5"></textarea>
          <span class="form-error" id="err-pair-text"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Audio File <span class="required">*</span></label>
          <div class="upload-zone" id="upload-zone" onclick="document.getElementById('input-audio-file').click()">
            <div class="upload-zone__wave">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <p class="upload-zone__text">Click to select an audio file</p>
            <p class="upload-zone__hint">MP3, WAV, OGG, M4A — up to 50MB</p>
            <input type="file" id="input-audio-file" accept="audio/*" style="display:none" onchange="onAudioFileSelected(this)" />
          </div>
          <div class="upload-preview" id="upload-preview"></div>
          <span class="form-error" id="err-pair-audio"></span>
        </div>
        <div class="modal__footer">
          <button type="button" class="btn btn--ghost" onclick="closeModal('modal-pair')">Cancel</button>
          <button type="submit" class="btn btn--primary" id="btn-submit-pair">Add Pair</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script>
/**
 * API Helper Module
 * Handles all communication with the backend
 *
 * Usage in app.js:
 *   api.get('/api/health')
 *   api.post('/api/items', { name: 'Item 1' })
 *   api.put('/api/items/1', { name: 'Updated' })
 *   api.delete('/api/items/1')
 *   api.uploadForm('/api/upload', formData)
 *
 * Upload file:
 *   const formData = new FormData();
 *   formData.append('file', fileInput.files[0]);
 *   const { file_url } = await api.uploadForm('/api/upload', formData);
 */

const API_URL = 'https://cecqzqhx5v27wtlfpkfstx3cpi0xuypc.lambda-url.ap-southeast-1.on.aws';

/**
 * Process response: check status and parse JSON
 */
async function processResponse(response) {
  const data = await response.json();

  if (!response.ok) {
    throw new Error(
      data?.detail || data?.error || `HTTP ${response.status}`
    );
  }

  if (data && data.error) {
    throw new Error(data.error);
  }

  return data;
}

const api = {
  /**
   * Make a GET request
   * @param {string} path - API path (e.g., '/api/health')
   * @param {object} params - Query parameters
   * @returns {Promise<any>} Response data
   */
  async get(path, params = {}) {
    const url = new URL(`${API_URL}${path}`);
    Object.entries(params).forEach(([key, value]) => {
      if (value !== undefined && value !== null) {
        url.searchParams.append(key, value);
      }
    });

    const response = await fetch(url.toString());
    return processResponse(response);
  },

  /**
   * Make a POST request
   * @param {string} path - API path (e.g., '/api/items')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async post(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a PUT request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Request body
   * @returns {Promise<any>} Response data
   */
  async put(path, body = {}) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return processResponse(response);
  },

  /**
   * Make a DELETE request
   * @param {string} path - API path (e.g., '/api/items/1')
   * @param {object} body - Optional request body
   * @returns {Promise<any>} Response data
   */
  async delete(path, body = null) {
    const options = { method: 'DELETE' };
    if (body) {
      options.headers = { 'Content-Type': 'application/json' };
      options.body = JSON.stringify(body);
    }

    const response = await fetch(`${API_URL}${path}`, options);
    return processResponse(response);
  },

  /**
   * Upload files with FormData
   * @param {string} path - API path (e.g., '/api/upload')
   * @param {FormData} formData - FormData object with files and fields
   * @returns {Promise<any>} Response data
   */
  async uploadForm(path, formData) {
    const response = await fetch(`${API_URL}${path}`, {
      method: 'POST',
      body: formData,
    });
    return processResponse(response);
  },
};

// Export for use in other modules
window.api = api;

</script>
  <script>
/**
 * AudioVault — Main Application Logic
 */

// ─── State ───────────────────────────────────────────────────────────────────
let currentProjectId = null;
let editingProjectId = null;
let uploadedAudioUrl = null;

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadProjects();
});

// ─── Views ────────────────────────────────────────────────────────────────────
function showProjectsView() {
  document.getElementById('view-projects').classList.remove('view--hidden');
  document.getElementById('view-detail').classList.add('view--hidden');
  document.getElementById('breadcrumb-nav').innerHTML = '';
  document.getElementById('btn-new-project').style.display = '';
  currentProjectId = null;
  loadProjects();
}

function showDetailView(project) {
  currentProjectId = project.id;
  document.getElementById('view-projects').classList.add('view--hidden');
  document.getElementById('view-detail').classList.remove('view--hidden');
  document.getElementById('detail-project-name').textContent = project.name;
  document.getElementById('detail-project-desc').textContent = project.description || '';
  document.getElementById('breadcrumb-nav').innerHTML =
    `<span style="opacity:0.4">◈</span> <span style="color:var(--accent)">${escapeHtml(project.name)}</span>`;
  document.getElementById('btn-new-project').style.display = 'none';
  loadPairs(project.id);
}

// ─── Projects ─────────────────────────────────────────────────────────────────
async function loadProjects() {
  const grid = document.getElementById('project-grid');
  grid.innerHTML = `<div class="loading-state"><div class="spinner"></div> Loading projects…</div>`;

  try {
    const projects = await api.get('/api/projects');
    renderProjects(projects);
  } catch (err) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-state__icon">⚠</div>
      <div class="empty-state__title">Could not load projects</div>
      <div class="empty-state__hint">${escapeHtml(err.message)}</div>
    </div>`;
  }
}

function renderProjects(projects) {
  const grid = document.getElementById('project-grid');
  if (projects.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-state__icon">♫</div>
      <div class="empty-state__title">No projects yet</div>
      <div class="empty-state__hint">Create your first project to start organizing text &amp; audio pairs</div>
    </div>`;
    return;
  }
  grid.innerHTML = projects.map((p, i) => `
    <div class="project-card" style="animation-delay:${i * 60}ms" onclick="openProject(${p.id}, event)">
      <div class="project-card__header">
        <div class="project-card__name">${escapeHtml(p.name)}</div>
        <div class="project-card__menu" onclick="event.stopPropagation()">
          <button class="btn btn--ghost btn--sm" onclick="openEditProjectModalById(${p.id}, '${escapeAttr(p.name)}', '${escapeAttr(p.description || '')}')">Edit</button>
          <button class="btn btn--danger btn--sm" onclick="confirmDeleteProjectById(${p.id}, '${escapeAttr(p.name)}')">Del</button>
        </div>
      </div>
      <div class="project-card__desc">${p.description ? escapeHtml(p.description) : '<em style="opacity:0.4">No description</em>'}</div>
      <div class="project-card__footer">
        <span class="project-card__badge">♪ ${p.pair_count} pair${p.pair_count !== 1 ? 's' : ''}</span>
        <span class="project-card__date">${formatDate(p.created_at)}</span>
      </div>
    </div>
  `).join('');
}

async function openProject(projectId, e) {
  if (e && e.target.closest('.project-card__menu')) return;
  try {
    const project = await api.get(`/api/projects/${projectId}`);
    showDetailView(project);
  } catch (err) {
    showToast('Failed to load project: ' + err.message, 'error');
  }
}

// ─── Create / Edit Project Modal ──────────────────────────────────────────────
function openCreateProjectModal() {
  editingProjectId = null;
  document.getElementById('modal-project-title').textContent = 'New Project';
  document.getElementById('btn-submit-project').textContent = 'Create Project';
  document.getElementById('input-project-name').value = '';
  document.getElementById('input-project-desc').value = '';
  document.getElementById('err-project-name').textContent = '';
  openModal('modal-project');
  setTimeout(() => document.getElementById('input-project-name').focus(), 100);
}

function openEditProjectModal() {
  const name = document.getElementById('detail-project-name').textContent;
  const desc = document.getElementById('detail-project-desc').textContent;
  openEditProjectModalById(currentProjectId, name, desc);
}

function openEditProjectModalById(id, name, desc) {
  editingProjectId = id;
  document.getElementById('modal-project-title').textContent = 'Edit Project';
  document.getElementById('btn-submit-project').textContent = 'Save Changes';
  document.getElementById('input-project-name').value = name;
  document.getElementById('input-project-desc').value = desc;
  document.getElementById('err-project-name').textContent = '';
  openModal('modal-project');
  setTimeout(() => document.getElementById('input-project-name').focus(), 100);
}

async function submitProjectForm(e) {
  e.preventDefault();
  const name = document.getElementById('input-project-name').value.trim();
  const description = document.getElementById('input-project-desc').value.trim();

  if (!name) {
    document.getElementById('err-project-name').textContent = 'Project name is required';
    return;
  }
  document.getElementById('err-project-name').textContent = '';

  const btn = document.getElementById('btn-submit-project');
  btn.disabled = true;
  btn.textContent = editingProjectId ? 'Saving…' : 'Creating…';

  try {
    if (editingProjectId) {
      const updated = await api.put(`/api/projects/${editingProjectId}`, { name, description });
      closeModal('modal-project');
      showToast('Project updated', 'success');
      if (currentProjectId === editingProjectId) {
        document.getElementById('detail-project-name').textContent = updated.name;
        document.getElementById('detail-project-desc').textContent = updated.description || '';
        document.getElementById('breadcrumb-nav').innerHTML =
          `<span style="opacity:0.4">◈</span> <span style="color:var(--accent)">${escapeHtml(updated.name)}</span>`;
      } else {
        loadProjects();
      }
    } else {
      await api.post('/api/projects', { name, description });
      closeModal('modal-project');
      showToast('Project created!', 'success');
      loadProjects();
    }
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = editingProjectId ? 'Save Changes' : 'Create Project';
  }
}

function confirmDeleteProject() {
  confirmDeleteProjectById(currentProjectId, document.getElementById('detail-project-name').textContent);
}

function confirmDeleteProjectById(id, name) {
  if (!confirm(`Delete project "${name}"?\n\nThis will also delete all audio pairs inside it.`)) return;
  deleteProject(id);
}

async function deleteProject(id) {
  try {
    await api.delete(`/api/projects/${id}`);
    showToast('Project deleted', 'success');
    if (currentProjectId === id) {
      showProjectsView();
    } else {
      loadProjects();
    }
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

// ─── Audio Pairs ──────────────────────────────────────────────────────────────
async function loadPairs(projectId) {
  const list = document.getElementById('pairs-list');
  list.innerHTML = `<div class="loading-state"><div class="spinner"></div> Loading pairs…</div>`;

  try {
    const pairs = await api.get(`/api/projects/${projectId}/pairs`);
    renderPairs(pairs);
  } catch (err) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-state__icon">⚠</div>
      <div class="empty-state__title">Could not load pairs</div>
      <div class="empty-state__hint">${escapeHtml(err.message)}</div>
    </div>`;
  }
}

function renderPairs(pairs) {
  const list = document.getElementById('pairs-list');
  if (pairs.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-state__icon">♪</div>
      <div class="empty-state__title">No pairs yet</div>
      <div class="empty-state__hint">Click "+ Add Pair" to upload your first text &amp; audio combination</div>
    </div>`;
    return;
  }
  list.innerHTML = pairs.map((pair, i) => `
    <div class="pair-card" style="animation-delay:${i * 50}ms">
      <div class="pair-card__header">
        <span class="pair-card__title">${pair.title ? escapeHtml(pair.title) : `Pair #${pair.id}`}</span>
        <span class="pair-card__date">${formatDate(pair.created_at)}</span>
      </div>
      <div class="pair-card__body">
        <div class="pair-card__text">${escapeHtml(pair.text_content)}</div>
        <div class="pair-card__audio">
          <audio controls preload="none" src="http://localhost:2701${pair.audio_url}"></audio>
        </div>
      </div>
      <div class="pair-card__footer">
        <button class="btn btn--danger btn--sm" onclick="deletePair(${pair.id})">Delete</button>
      </div>
    </div>
  `).join('');
}

// ─── Add Pair Modal ───────────────────────────────────────────────────────────
function openAddPairModal() {
  uploadedAudioUrl = null;
  document.getElementById('input-pair-title').value = '';
  document.getElementById('input-pair-text').value = '';
  document.getElementById('input-audio-file').value = '';
  document.getElementById('upload-preview').textContent = '';
  document.getElementById('err-pair-text').textContent = '';
  document.getElementById('err-pair-audio').textContent = '';
  openModal('modal-pair');
  setTimeout(() => document.getElementById('input-pair-title').focus(), 100);
}

function onAudioFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('upload-preview');
  preview.textContent = `♫  ${file.name}  (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
}

async function submitPairForm(e) {
  e.preventDefault();

  const title = document.getElementById('input-pair-title').value.trim();
  const text = document.getElementById('input-pair-text').value.trim();
  const fileInput = document.getElementById('input-audio-file');

  let valid = true;
  if (!text) {
    document.getElementById('err-pair-text').textContent = 'Text content is required';
    valid = false;
  } else {
    document.getElementById('err-pair-text').textContent = '';
  }
  if (!fileInput.files[0] && !uploadedAudioUrl) {
    document.getElementById('err-pair-audio').textContent = 'Please select an audio file';
    valid = false;
  } else {
    document.getElementById('err-pair-audio').textContent = '';
  }
  if (!valid) return;

  const btn = document.getElementById('btn-submit-pair');
  btn.disabled = true;
  btn.textContent = 'Uploading…';

  try {
    // Upload audio first
    if (fileInput.files[0]) {
      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      const uploaded = await api.uploadForm('/api/upload', formData);
      uploadedAudioUrl = uploaded.file_url;
    }

    // Create the pair
    await api.post(`/api/projects/${currentProjectId}/pairs`, {
      title: title || null,
      text_content: text,
      audio_url: uploadedAudioUrl,
    });

    closeModal('modal-pair');
    showToast('Pair added!', 'success');
    loadPairs(currentProjectId);
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add Pair';
    uploadedAudioUrl = null;
  }
}

async function deletePair(pairId) {
  if (!confirm('Delete this text & audio pair?')) return;
  try {
    await api.delete(`/api/projects/${currentProjectId}/pairs/${pairId}`);
    showToast('Pair deleted', 'success');
    loadPairs(currentProjectId);
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
}

// ─── Modal helpers ────────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('active');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast toast--visible toast--${type}`;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.className = 'toast';
  }, 3000);
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function escapeHtml(text) {
  if (text == null) return '';
  const d = document.createElement('div');
  d.textContent = String(text);
  return d.innerHTML;
}

function escapeAttr(text) {
  if (text == null) return '';
  return String(text).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function formatDate(dateString) {
  if (!dateString) return '';
  return new Date(dateString).toLocaleDateString('en-GB', {
    day: 'numeric', month: 'short', year: 'numeric',
  });
}

</script>
