<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <title>App</title>
    <!-- AI: Add Google Fonts link here for distinctive typography -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-shell">
        <!-- Top Bar -->
        <header class="top-bar">
            <h1 class="top-bar__title">App</h1>
        </header>

        <!-- Scrollable Content Area -->
        <main class="content-area">
            <section id="content">
                <!-- Dynamic content will be loaded here -->
            </section>
        </main>

        <!-- Bottom Navigation (tab bar) -->
        <nav class="bottom-nav">
            <button class="bottom-nav__item bottom-nav__item--active" data-tab="home">
                <span class="bottom-nav__icon">&#9750;</span>
                <span class="bottom-nav__label">Home</span>
            </button>
            <button class="bottom-nav__item" data-tab="search">
                <span class="bottom-nav__icon">&#9906;</span>
                <span class="bottom-nav__label">Search</span>
            </button>
            <button class="bottom-nav__item" data-tab="profile">
                <span class="bottom-nav__icon">&#9787;</span>
                <span class="bottom-nav__label">Profile</span>
            </button>
        </nav>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
