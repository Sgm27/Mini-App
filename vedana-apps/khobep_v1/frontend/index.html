<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Quản lý kho bếp nhà hàng - Nhập kho, tồn kho, báo cáo">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Kho Bếp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&subset=vietnamese&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell" id="app">

    <!-- Top Bar -->
    <header class="top-bar" id="top-bar">
      <div class="top-bar__left">
        <span class="top-bar__logo"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6z"/><line x1="6" y1="17" x2="18" y2="17"/></svg></span>
        <div>
          <h1 class="top-bar__title" id="page-title">Nhập Kho</h1>
          <p class="top-bar__subtitle" id="page-subtitle"></p>
        </div>
      </div>
      <div class="top-bar__right" id="top-bar-actions"></div>
    </header>

    <!-- Content Area -->
    <main class="content-area" id="content">
      <div class="loading-screen">
        <div class="spinner"></div>
        <p style="color:var(--text-muted);margin-top:12px;font-size:14px;">Đang tải...</p>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" role="navigation">
      <button class="bottom-nav__item bottom-nav__item--active" data-tab="import">
        <span class="bottom-nav__icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </span>
        <span class="bottom-nav__label">Nhập Kho</span>
      </button>

      <button class="bottom-nav__item" data-tab="inventory">
        <span class="bottom-nav__icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
        </span>
        <span class="bottom-nav__label">Tồn Kho</span>
      </button>

      <button class="bottom-nav__item" data-tab="reports">
        <span class="bottom-nav__icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
        </span>
        <span class="bottom-nav__label">Báo Cáo</span>
      </button>

      <button class="bottom-nav__item" data-tab="orders">
        <span class="bottom-nav__icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            <line x1="9" y1="12" x2="15" y2="12"/>
            <line x1="9" y1="16" x2="15" y2="16"/>
          </svg>
        </span>
        <span class="bottom-nav__label">Đơn Bếp</span>
      </button>
    </nav>

  </div>

  <!-- Bottom Sheet Overlay -->
  <div class="sheet-overlay" id="sheet-overlay" hidden></div>

  <!-- Hidden camera input -->
  <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" aria-hidden="true">

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
