<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Ứng dụng đặt món cho nhân viên nhà hàng" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FF6B2B" />
  <title>Nhà Hàng Việt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&subset=vietnamese&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Top bar -->
    <header class="top-bar">
      <div class="top-bar__brand">
        <span class="top-bar__logo">🍜</span>
        <h1 class="top-bar__title">Nhà Hàng Việt</h1>
      </div>
      <div class="top-bar__actions" id="top-bar-actions"></div>
    </header>

    <!-- Content area -->
    <main class="content-area" id="content-area">
      <div class="loading-screen">
        <div class="spinner spinner--lg"></div>
        <p class="loading-text">Đang tải...</p>
      </div>
    </main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav">
      <button class="bottom-nav__item bottom-nav__item--active" data-tab="menu" aria-label="Thực đơn">
        <span class="bottom-nav__icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/>
            <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
          </svg>
        </span>
        <span class="bottom-nav__label">Thực đơn</span>
      </button>

      <button class="bottom-nav__item" data-tab="order" aria-label="Đơn hàng">
        <span class="bottom-nav__icon" style="position:relative">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
          </svg>
          <span class="nav-badge" id="cart-badge" style="display:none">0</span>
        </span>
        <span class="bottom-nav__label">Đơn hàng</span>
      </button>

      <button class="bottom-nav__item" data-tab="inventory" aria-label="Kho bếp">
        <span class="bottom-nav__icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
            <path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>
          </svg>
        </span>
        <span class="bottom-nav__label">Kho bếp</span>
      </button>
    </nav>

  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
